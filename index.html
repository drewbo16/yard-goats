<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yard Goats Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#002c76;--blue-mid:#003d9e;--blue-light:#1a4f9e;
  --green:#009a49;--green-dark:#007a38;--green-light:#00b855;
  --tan:#b7985e;--tan-light:#cfab7a;--tan-dark:#8a6e3a;
  --gray:#c4c7c8;--off-white:#f4f6f8;
  --text:#0a1628;--text-muted:#4a5568;
  --border:#d1d9e6;--stripe:#f0f4fa;--card:#fff;--red:#c0392b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--off-white);color:var(--text);min-height:100vh;}

.site-header{background:var(--blue);padding:0 16px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:200;box-shadow:0 3px 16px rgba(0,44,118,.35);min-height:58px;}
.header-logo{height:46px;mix-blend-mode:screen;}
.team-name{font-family:'Bebas Neue',cursive;font-size:27px;letter-spacing:3px;color:var(--tan-light);line-height:1;}
.team-sub{font-size:10px;color:rgba(196,199,200,.7);letter-spacing:2px;text-transform:uppercase;}
.header-badge{margin-left:auto;background:var(--green);color:#fff;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:99px;}

.tab-bar{background:var(--blue);display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:3px solid var(--green);position:sticky;top:58px;z-index:199;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-btn{padding:11px 15px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(196,199,200,.6);border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-3px;font-family:'DM Sans',sans-serif;}
.tab-btn:hover{color:var(--gray);}
.tab-btn.active{color:var(--tan-light);border-bottom-color:var(--tan);}

.filter-bar{background:var(--blue-mid);padding:8px 16px;display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;border-bottom:1px solid rgba(0,154,73,.3);}
.fg{display:flex;flex-direction:column;gap:2px;}
.fg label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--tan-light);}
select,input[type=number]{background:rgba(255,255,255,.12);border:1px solid rgba(183,152,94,.4);border-radius:4px;padding:5px 8px;font-size:12px;color:#fff;font-family:'DM Sans',sans-serif;min-width:95px;}
select option{background:var(--blue);color:#fff;}
.toggle-btn{background:rgba(0,154,73,.25);border:1px solid rgba(0,154,73,.5);border-radius:4px;padding:5px 10px;font-size:11px;font-weight:700;color:#7de8aa;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.toggle-btn.active{background:var(--green);color:#fff;border-color:var(--green);}

.main{padding:14px 16px 50px;}
.tab-page{display:none;}
.tab-page.active{display:block;}

/* LEADERS */
.leaders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:11px;}
.leader-card{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,44,118,.08);}
.lc-header{background:linear-gradient(135deg,var(--blue),var(--blue-mid));color:var(--tan-light);font-family:'Bebas Neue',cursive;font-size:17px;letter-spacing:1.5px;padding:7px 12px 6px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--green);}
.lc-sub{font-size:9px;color:rgba(196,199,200,.7);font-family:'DM Sans',sans-serif;font-weight:600;text-transform:uppercase;}
.leader-row{display:flex;align-items:center;padding:6px 10px;border-bottom:1px solid var(--stripe);}
.leader-row:last-child{border-bottom:none;}
.leader-row:hover{background:var(--stripe);}
.lrank{font-size:10px;color:var(--text-muted);width:14px;font-family:'DM Mono',monospace;flex-shrink:0;}
.lrank.gold{color:var(--tan);font-weight:700;}
.lname{flex:1;font-size:13px;font-weight:500;padding:0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lval{font-family:'DM Mono',monospace;font-size:13px;font-weight:600;color:var(--green-dark);}

/* STICKY TABLES */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow-x:auto;box-shadow:0 2px 8px rgba(0,44,118,.08);}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:12px;}
thead tr{background:linear-gradient(135deg,var(--blue),var(--blue-mid));color:#fff;}
thead th{padding:9px 10px;text-align:right;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;white-space:nowrap;cursor:pointer;user-select:none;border-right:1px solid rgba(255,255,255,.08);border-bottom:1px solid var(--border);}
thead th:first-child{text-align:left;padding-left:12px;border-right:2px solid var(--green);position:sticky;left:0;z-index:10;background:var(--blue);min-width:130px;}
thead th:hover:not(:first-child){background:rgba(255,255,255,.1);}
thead th.sorted{color:var(--tan-light);}
.sarr{font-size:8px;margin-left:2px;}
tbody tr{border-bottom:1px solid var(--border);}
tbody tr:nth-child(even){background:var(--stripe);}
tbody tr:hover{background:#e4edfb;}
tbody td{padding:6px 10px;text-align:right;font-family:'DM Mono',monospace;font-size:12px;white-space:nowrap;border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
tbody td:first-child{text-align:left;padding-left:12px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;border-right:2px solid var(--green);position:sticky;left:0;z-index:5;background:#fff;min-width:130px;}
tbody tr:nth-child(even) td:first-child{background:var(--stripe);}
tbody tr:hover td:first-child{background:#e4edfb;}
.hi{color:var(--green-dark);font-weight:700;}
.lo{color:var(--red);}

/* OVERVIEW */
.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:10px;margin-bottom:16px;}
.chip{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 10px;text-align:center;box-shadow:0 2px 6px rgba(0,44,118,.07);}
.chip .val{font-family:'Bebas Neue',cursive;font-size:34px;color:var(--blue);line-height:1;}
.chip .lbl{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-top:2px;font-weight:700;}
.chip.wins .val{color:var(--green-dark);}
.chip.losses .val{color:var(--red);}
.chip.pct .val{font-size:26px;}
.sec-title{font-family:'Bebas Neue',cursive;font-size:19px;letter-spacing:1.5px;color:var(--blue);margin:16px 0 10px;padding-bottom:4px;border-bottom:3px solid var(--green);display:flex;align-items:center;gap:8px;}
.sec-title::before{content:'';display:block;width:4px;height:18px;background:var(--tan);border-radius:2px;}
.pill{display:inline-block;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:700;}
.pill-rs{background:#d4edda;color:#155724;}
.pill-po{background:#fff3cd;color:#7a5c00;}
.pill-tie{background:#e8e8f0;color:#444;}
.ms-wrap{position:relative;display:inline-block;}
.ms-btn{background:rgba(255,255,255,.12);border:1px solid rgba(183,152,94,.4);border-radius:4px;padding:5px 28px 5px 8px;font-size:12px;color:#fff;font-family:'DM Sans',sans-serif;min-width:130px;cursor:pointer;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:relative;}
.ms-btn::after{content:'▾';position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--tan-light);}
.ms-dropdown{display:none;position:absolute;top:100%;left:0;background:var(--blue-mid);border:1px solid rgba(183,152,94,.4);border-radius:4px;z-index:300;min-width:140px;box-shadow:0 4px 12px rgba(0,0,0,.3);max-height:240px;overflow-y:auto;}
.ms-dropdown.open{display:block;}
.ms-option{display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;font-size:12px;color:#fff;font-family:'DM Sans',sans-serif;}
.ms-option:hover{background:rgba(255,255,255,.1);}
.ms-option input[type=checkbox]{accent-color:var(--green);width:13px;height:13px;cursor:pointer;}
.ms-clear{padding:5px 10px;font-size:10px;color:var(--tan-light);cursor:pointer;border-top:1px solid rgba(183,152,94,.3);text-align:center;font-weight:700;}
.ms-clear:hover{background:rgba(183,152,94,.15);}
.no-data{text-align:center;padding:60px 24px;color:var(--text-muted);}
.no-data .icon{font-size:52px;margin-bottom:12px;}
.no-data h3{font-family:'Bebas Neue',cursive;font-size:24px;color:var(--blue);margin-bottom:6px;letter-spacing:1px;}

/* PLAYER PROFILE */
.profile-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,44,118,.1);margin-bottom:16px;}
.profile-header{background:linear-gradient(135deg,var(--blue),var(--blue-mid) 60%,var(--blue-light));padding:20px 20px 16px;border-bottom:4px solid var(--green);}
.profile-name{font-family:'Bebas Neue',cursive;font-size:36px;letter-spacing:2px;color:var(--tan-light);line-height:1;margin-bottom:4px;}
.profile-meta{font-size:12px;color:rgba(196,199,200,.8);letter-spacing:.5px;}
.profile-meta span{margin-right:14px;}
.profile-role-badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-left:8px;}
.role-hitter{background:rgba(0,154,73,.3);color:#7de8aa;border:1px solid rgba(0,154,73,.5);}
.role-pitcher{background:rgba(183,152,94,.3);color:var(--tan-light);border:1px solid rgba(183,152,94,.5);}
.role-both{background:rgba(0,44,118,.4);color:#a0b8f0;border:1px solid rgba(100,140,220,.5);}
.profile-stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;padding:16px;}
.pstat{text-align:center;padding:10px 8px;background:var(--off-white);border-radius:7px;border:1px solid var(--border);}
.pstat .pval{font-family:'Bebas Neue',cursive;font-size:26px;color:var(--blue);line-height:1;}
.pstat .pval.green{color:var(--green-dark);}
.pstat .pval.gold{color:var(--tan-dark);}
.pstat .plbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);margin-top:2px;}
.best-season-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px 16px;}
.best-season-card{background:var(--off-white);border-radius:8px;border:1px solid var(--border);overflow:hidden;}
.bsc-header{background:linear-gradient(90deg,var(--green-dark),var(--green));color:#fff;padding:8px 12px;font-family:'Bebas Neue',cursive;font-size:14px;letter-spacing:1px;display:flex;justify-content:space-between;align-items:center;}
.bsc-header.pit{background:linear-gradient(90deg,var(--blue),var(--blue-mid));}
.bsc-year{font-size:18px;color:var(--tan-light);}
.bsc-stats{padding:10px 12px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.bsc-stat{text-align:center;}
.bsc-val{font-family:'DM Mono',monospace;font-size:15px;font-weight:700;color:var(--blue);}
.bsc-lbl{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--text-muted);}
.season-log{padding:0 16px 16px;}
.season-log-scroll{overflow-x:auto;border-radius:6px;border:1px solid var(--border);margin-bottom:8px;}
.season-log table{width:max-content;min-width:100%;border-collapse:collapse;font-size:12px;}
.season-log thead th{background:var(--blue);color:var(--tan-light);padding:7px 10px;text-align:right;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;white-space:nowrap;}
.season-log thead th:first-child{text-align:left;}
.season-log tbody td{padding:6px 10px;text-align:right;font-family:'DM Mono',monospace;font-size:12px;border-bottom:1px solid var(--border);white-space:nowrap;}
.season-log tbody td:first-child{text-align:left;font-family:'DM Sans',sans-serif;font-weight:600;}
.season-log tbody tr:hover{background:var(--stripe);}
.highlight-row{background:#fffbf0!important;border-left:3px solid var(--tan);}

/* HIT STREAKS */
.streak-hero{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.streak-hero-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 2px 10px rgba(0,44,118,.1);}
.shc-header{padding:10px 14px 8px;border-bottom:3px solid var(--green);background:linear-gradient(135deg,var(--blue),var(--blue-mid));}
.shc-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--tan-light);margin-bottom:2px;}
.shc-player{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:1.5px;color:#fff;line-height:1;}
.shc-num{font-family:'Bebas Neue',cursive;font-size:64px;color:var(--tan-light);line-height:1;padding:8px 14px 4px;}
.shc-sub{font-size:11px;color:var(--text-muted);padding:0 14px 12px;}
.streak-bar-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--stripe);}
.streak-bar-row:last-child{border-bottom:none;}
.sb-rank{font-size:11px;color:var(--text-muted);width:18px;font-family:'DM Mono',monospace;flex-shrink:0;}
.sb-rank.gold{color:var(--tan-dark);font-weight:700;}
.sb-name{font-size:13px;font-weight:600;width:130px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-bar-wrap{flex:1;background:var(--stripe);border-radius:3px;height:12px;overflow:hidden;}
.sb-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green-dark),var(--green-light));}
.sb-val{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:var(--green-dark);width:28px;text-align:right;flex-shrink:0;}
.sb-season{font-size:10px;color:var(--text-muted);width:36px;flex-shrink:0;text-align:right;}
.sb-active-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;box-shadow:0 0 4px var(--green);}

/* TRENDS */
.trends-controls{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px;}
.trends-controls label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);display:block;margin-bottom:2px;}
.trends-controls select{background:#fff;border:2px solid var(--blue);border-radius:6px;padding:6px 10px;font-size:13px;font-weight:600;color:var(--blue);font-family:'DM Sans',sans-serif;}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;box-shadow:0 2px 8px rgba(0,44,118,.08);margin-bottom:14px;}
.chart-title{font-family:'Bebas Neue',cursive;font-size:17px;letter-spacing:1.2px;color:var(--blue);margin-bottom:12px;}
.chart-wrap{width:100%;overflow-x:auto;}
svg.trend-chart{display:block;}

/* SINGLE GAME RECORDS */
.sgr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.sgr-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,44,118,.08);}
.sgr-header{background:linear-gradient(135deg,var(--blue),var(--blue-mid));padding:10px 14px;border-bottom:2px solid var(--green);display:flex;align-items:center;justify-content:space-between;}
.sgr-title{font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:1.5px;color:var(--tan-light);}
.sgr-icon{font-size:20px;}
.sgr-row{display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid var(--stripe);gap:8px;}
.sgr-row:last-child{border-bottom:none;}
.sgr-row:hover{background:var(--stripe);}
.sgr-rank{font-size:10px;color:var(--text-muted);width:16px;font-family:'DM Mono',monospace;flex-shrink:0;}
.sgr-rank.gold{color:var(--tan);font-weight:700;}
.sgr-info{flex:1;min-width:0;}
.sgr-player{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sgr-detail{font-size:10px;color:var(--text-muted);margin-top:1px;}
.sgr-val{font-family:'Bebas Neue',cursive;font-size:28px;color:var(--green-dark);flex-shrink:0;line-height:1;}
.sgr-val.blue{color:var(--blue);}


/* SINGLE GAME RECORDS */
.sgr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.sgr-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,44,118,.08);}
.sgr-header{background:linear-gradient(135deg,var(--blue),var(--blue-mid));padding:10px 14px;border-bottom:2px solid var(--green);display:flex;align-items:center;justify-content:space-between;}
.sgr-title{font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:1.5px;color:var(--tan-light);}
.sgr-icon{font-size:20px;}
.sgr-row{display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid var(--stripe);gap:8px;}
.sgr-row:last-child{border-bottom:none;}
.sgr-row:hover{background:var(--stripe);}
.sgr-rank{font-size:10px;color:var(--text-muted);width:16px;font-family:'DM Mono',monospace;flex-shrink:0;}
.sgr-rank.gold{color:var(--tan);font-weight:700;}
.sgr-info{flex:1;min-width:0;}
.sgr-player{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sgr-detail{font-size:10px;color:var(--text-muted);margin-top:1px;}
.sgr-val{font-family:'Bebas Neue',cursive;font-size:28px;color:var(--green-dark);flex-shrink:0;line-height:1;}
.sgr-val.blue{color:var(--blue);}


/* ASK THE GOAT */
.ask-wrap{max-width:720px;margin:0 auto;}
.ask-hero{background:linear-gradient(135deg,var(--blue),var(--blue-mid));border-radius:12px;padding:20px 20px 16px;margin-bottom:16px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 16px rgba(0,44,118,.2);}
.ask-hero-logo{height:52px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4));}
.ask-hero-text .ask-title{font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:2px;color:var(--tan-light);line-height:1;}
.ask-hero-text .ask-sub{font-size:11px;color:rgba(196,199,200,.7);letter-spacing:.5px;margin-top:2px;}
.ask-messages{display:flex;flex-direction:column;gap:12px;margin-bottom:14px;min-height:80px;}
.ask-msg{display:flex;gap:10px;align-items:flex-start;}
.ask-msg.user{flex-direction:row-reverse;}
.ask-bubble{padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6;max-width:85%;}
.ask-msg.user .ask-bubble{background:var(--blue);color:#fff;border-bottom-right-radius:3px;}
.ask-msg.bot  .ask-bubble{background:var(--card);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:3px;box-shadow:0 1px 4px rgba(0,44,118,.06);}
.ask-msg.bot  .ask-bubble.loading{color:var(--text-muted);font-style:italic;}
.ask-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px;}
.ask-avatar.bot{background:var(--blue);border:2px solid var(--green);}
.ask-avatar.user{background:var(--tan);font-size:11px;font-weight:700;color:var(--blue);}
.ask-input-row{display:flex;gap:8px;}
.ask-input{flex:1;background:#fff;border:2px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);resize:none;transition:border-color .15s;}
.ask-input:focus{outline:none;border-color:var(--blue);}
.ask-send{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:background .15s;}
.ask-send:hover{background:var(--blue-mid);}
.ask-send:disabled{background:var(--gray);cursor:not-allowed;}
.ask-suggestions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.ask-chip{background:#fff;border:1px solid var(--border);border-radius:99px;padding:5px 12px;font-size:11px;font-weight:600;color:var(--blue);cursor:pointer;transition:all .15s;white-space:nowrap;}
.ask-chip:hover{background:var(--blue);color:#fff;border-color:var(--blue);}
.ask-disclaimer{font-size:10px;color:var(--text-muted);text-align:center;margin-top:10px;line-height:1.5;}

/* FANTASY POINTS */
.fp-controls{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px;padding:12px 16px;background:var(--blue-mid);border-radius:8px;}
.fp-controls label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--tan-light);display:block;margin-bottom:2px;}
.fp-controls select{background:rgba(255,255,255,.12);border:1px solid rgba(183,152,94,.4);border-radius:4px;padding:5px 8px;font-size:12px;color:#fff;font-family:'DM Sans',sans-serif;min-width:100px;}
.fp-controls select option{background:var(--blue);}
.fp-chart-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,44,118,.08);}
.fp-chart-title{font-family:'Bebas Neue',cursive;font-size:17px;letter-spacing:1.2px;color:var(--blue);margin-bottom:4px;}
.fp-chart-sub{font-size:11px;color:var(--text-muted);margin-bottom:12px;}
.fp-dot-wrap{width:100%;overflow-x:auto;}
.fp-leaderboards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.fp-lb-card{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 2px 6px rgba(0,44,118,.07);}
.fp-lb-header{background:linear-gradient(135deg,var(--blue),var(--blue-mid));color:var(--tan-light);font-family:'Bebas Neue',cursive;font-size:14px;letter-spacing:1px;padding:8px 12px;border-bottom:2px solid var(--green);}
.fp-lb-header.bottom{border-bottom-color:var(--red);}
.fp-lb-row{display:flex;align-items:center;padding:6px 10px;border-bottom:1px solid var(--stripe);gap:6px;}
.fp-lb-row:last-child{border-bottom:none;}
.fp-lb-row:hover{background:var(--stripe);}
.fp-lb-rank{font-size:10px;color:var(--text-muted);width:16px;font-family:'DM Mono',monospace;flex-shrink:0;}
.fp-lb-rank.gold{color:var(--tan);font-weight:700;}
.fp-lb-info{flex:1;min-width:0;}
.fp-lb-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fp-lb-detail{font-size:10px;color:var(--text-muted);}
.fp-lb-val{font-family:'DM Mono',monospace;font-size:14px;font-weight:700;flex-shrink:0;}
.fp-lb-val.pos{color:var(--green-dark);}
.fp-lb-val.neg{color:var(--red);}
.fp-tooltip{position:fixed;background:var(--blue);color:#fff;padding:8px 12px;border-radius:6px;font-size:12px;pointer-events:none;z-index:9999;display:none;max-width:200px;box-shadow:0 4px 12px rgba(0,0,0,.3);border:1px solid var(--tan);}
@media(max-width:640px){
  .leaders-grid{grid-template-columns:1fr 1fr;gap:8px;}
  .ov-grid{grid-template-columns:repeat(3,1fr);}
  .chip .val{font-size:26px;}
  .best-season-grid{grid-template-columns:1fr;}
  .profile-stats-grid{grid-template-columns:repeat(3,1fr);}
  .streak-hero{grid-template-columns:1fr;}
  .sgr-grid{grid-template-columns:1fr;}
}
@media(max-width:380px){.leaders-grid{grid-template-columns:1fr;}}
</style>
</head>

<script>
// ── DATA ──────────────────────────────────────────────────────────────
var hitData=[]; var pitData=[]; var schedData=[]; var rosterData=[];
var batSortKey='AVG'; var batSortDir=1;
var pitSortKey='ERA'; var pitSortDir=1;
var recordCombined=true;
var selectedSeasons=new Set();
var trendPlayer=''; var trendStat='AVG'; var trendMode='career'; var trendSeason='all';

function parseCSV(text){
  var lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim().split('\n');
  if(!lines.length)return[];
  var hdr=lines[0].split(',').map(function(h){return h.trim().replace(/^"|"$/g,'');});
  var out=[];
  for(var i=1;i<lines.length;i++){
    var line=lines[i]; if(!line.trim())continue;
    var vals=[],cur='',inQ=false;
    for(var c=0;c<line.length;c++){
      var ch=line[c];
      if(ch==='"'){inQ=!inQ;}
      else if(ch===','&&!inQ){vals.push(cur.trim());cur='';}
      else{cur+=ch;}
    }
    vals.push(cur.trim());
    var obj={};
    for(var j=0;j<hdr.length;j++)obj[hdr[j]]=vals[j]!==undefined?vals[j]:'';
    out.push(obj);
  }
  return out;
}

function isPlayer(r){return r['Player']&&r['Player'].trim()&&r['Player']!=='Empty'&&r['Player']!=='Player';}
function num(v){return parseFloat(v)||0;}
function fmtAvg(v){if(isNaN(v)||!isFinite(v))return'---';var s=v.toFixed(3);if(s.indexOf('0.')===0)return s.slice(1);if(s.indexOf('-0.')===0)return'-'+s.slice(2);return s;}
function fmt2(v){return(isNaN(v)||!isFinite(v))?'--':v.toFixed(2);}
function fmtI(v){return(isNaN(v)||!isFinite(v))?'-':String(Math.round(v));}
function fmtIP(ip){if(isNaN(ip)||!isFinite(ip))return'-';var f=Math.floor(ip),fr=ip-f;if(fr<0.10)return f+'.0';if(fr<0.45)return f+'.1';if(fr<0.78)return f+'.2';return(f+1)+'.0';}
function fmtStr(v){return v||'-';}

// ── ROSTER STATUS SORT ────────────────────────────────────────────────
var rosterStatus={};
rosterData.forEach(function(r){if(r['Player'])rosterStatus[r['Player'].trim()]=r['Status']||'';});
var statusOrder={'Active':0,'Inactive':1,'Sub':2,'':3};
function playerSort(a,b){
  var sa=statusOrder[rosterStatus[a]]!==undefined?statusOrder[rosterStatus[a]]:3;
  var sb=statusOrder[rosterStatus[b]]!==undefined?statusOrder[rosterStatus[b]]:3;
  if(sa!==sb)return sa-sb;
  return a.localeCompare(b);
}

// ── FILTERS ───────────────────────────────────────────────────────────
function populateFilters(){
  var seasons={};
  hitData.concat(pitData).concat(schedData).forEach(function(r){if(r['Season'])seasons[r['Season']]=true;});
  var list=Object.keys(seasons).sort().reverse();
  var dd=document.getElementById('msDropdown');
  // keep the first clear option, rebuild the rest
  dd.innerHTML='<div class="ms-option" onclick="clearSeasonSel()"><em style="font-size:11px;color:var(--tan-light)">Clear (All Seasons)</em></div>';
  list.forEach(function(s){
    var row=document.createElement('div');row.className='ms-option';
    var cb=document.createElement('input');cb.type='checkbox';cb.value=s;
    cb.checked=selectedSeasons.has(s);
    cb.addEventListener('change',function(){
      if(this.checked)selectedSeasons.add(this.value);
      else selectedSeasons.delete(this.value);
      updateMsLabel();onSeasonChange();
    });
    var lbl=document.createElement('label');lbl.textContent=s;lbl.style.cursor='pointer';
    lbl.addEventListener('click',function(){cb.click();});
    row.appendChild(cb);row.appendChild(lbl);
    dd.appendChild(row);
  });
  // Auto-select 2026 on first load if nothing selected
  if(selectedSeasons.size===0 && list.indexOf('2026')!==-1){
    selectedSeasons.add('2026');
    var cbs=document.querySelectorAll('#msDropdown input[type=checkbox]');
    cbs.forEach(function(cb){if(cb.value==='2026')cb.checked=true;});
  }
  updateMsLabel();
}

function updateMsLabel(){
  var btn=document.getElementById('msBtnLabel');
  if(selectedSeasons.size===0){btn.textContent='All Seasons';}
  else if(selectedSeasons.size===1){btn.textContent=Array.from(selectedSeasons)[0];}
  else{var sorted=Array.from(selectedSeasons).sort();btn.textContent=sorted[0]+' + '+(sorted.length-1)+' more';}
}

function clearSeasonSel(){
  selectedSeasons.clear();
  document.querySelectorAll('#msDropdown input[type=checkbox]').forEach(function(cb){cb.checked=false;});
  updateMsLabel();onSeasonChange();
}

function toggleMsDropdown(){
  var dd=document.getElementById('msDropdown');
  dd.classList.toggle('open');
}

// Close dropdown when clicking outside
document.addEventListener('click',function(e){
  var wrap=document.getElementById('msWrap');
  if(wrap&&!wrap.contains(e.target)){
    var dd=document.getElementById('msDropdown');
    if(dd)dd.classList.remove('open');
  }
});
function onSeasonChange(){
  var single=selectedSeasons.size===1;
  // Use 1 for current/recent season, higher for multi-season
  var curSeasons=Array.from(selectedSeasons);
  var hasRecent=curSeasons.indexOf('2026')!==-1||curSeasons.indexOf('2025')!==-1;
  document.getElementById('minAB').value=single?(hasRecent?'1':'10'):'50';
  document.getElementById('minIP').value=single?(hasRecent?'1':'3'):'15';
  renderAll();
}
function toggleRecord(){
  recordCombined=!recordCombined;
  var btn=document.getElementById('recordToggle');
  btn.textContent=recordCombined?'Combined':'Split';
  btn.className=recordCombined?'toggle-btn active':'toggle-btn';
  renderOverview(getF());
}
function getF(){
  return{season:selectedSeasons.size>0?Array.from(selectedSeasons):'all',
         type:document.getElementById('filterType').value,
         minAB:parseFloat(document.getElementById('minAB').value)||0,
         minIP:parseFloat(document.getElementById('minIP').value)||0};
}
function filt(data,f){
  return data.filter(function(r){
    if(f.season!=='all'){
      var seas=Array.isArray(f.season)?f.season:[f.season];
      if(seas.indexOf(String(r['Season']))===-1)return false;
    }
    if(f.type!=='all'&&r['Type']!==f.type)return false;
    return true;
  });
}

  document.getElementById('minABGroup').style.display=(tabId==='batLeaders'||tabId==='batFull')?'':'none';

// ── AGGREGATION ───────────────────────────────────────────────────────
function aggHit(rows){
  // Exclude 0 PA rows; count GP only once per season+game even if pitch+hit same game
  var map={};
  rows.forEach(function(r){
    if(num(r['PA'])===0)return; // exclude 0 PA
    var p=r['Player'];if(!p)return;
    if(!map[p])map[p]={Player:p,GP:{},PA:0,AB:0,H:0,B1:0,B2:0,B3:0,HR:0,RBI:0,R:0,HBP:0,ROE:0,BB:0,SO:0,SB:0,SF:0};
    var m=map[p];
    m.GP[r['Season']+'_'+r['Game #']]=1;
    m.PA+=num(r['PA']);m.AB+=num(r['AB']);m.H+=num(r['H']);
    m.B1+=num(r['1B']);m.B2+=num(r['2B']);m.B3+=num(r['3B']);m.HR+=num(r['HR']);
    m.RBI+=num(r['RBI']);m.R+=num(r['R']);m.HBP+=num(r['HBP']);
    m.ROE+=num(r['ROE']);m.BB+=num(r['BB']);m.SO+=num(r['SO']);
    m.SB+=num(r['SB']);m.SF+=num(r['SF']);
  });
  return Object.values(map).map(function(m){
    m.GP=Object.keys(m.GP).length;
    m.AVG=m.AB?m.H/m.AB:0;
    m.OBP=m.PA?(m.H+m.BB+m.HBP)/m.PA:0;
    m.SLG=m.AB?(m.B1+2*m.B2+3*m.B3+4*m.HR)/m.AB:0;
    m.OPS=m.OBP+m.SLG;
    return m;
  });
}

function aggPit(rows){
  var map={};
  rows.forEach(function(r){
    var p=r['Player'];if(!p)return;
    if(!map[p])map[p]={Player:p,GP:0,GS:0,W:0,L:0,SV:0,SVO:0,BS:0,IP:0,H:0,R:0,ER:0,BB:0,SO:0,HBP:0,CG:0};
    var m=map[p];
    m.GP++;m.GS+=num(r['GS']);m.W+=num(r['W']);m.L+=num(r['L']);
    m.SV+=num(r['SV']);m.SVO+=num(r['SVO']);m.BS+=num(r['BS']);
    m.IP+=num(r['IP']);m.H+=num(r['H']);m.R+=num(r['R']);m.ER+=num(r['ER']);
    m.BB+=num(r['BB']);m.SO+=num(r['SO']);m.HBP+=num(r['HBP']);
    if(num(r['IP'])>=7)m.CG++;
  });
  return Object.values(map).map(function(m){
    m.ERA=m.IP?(m.ER/m.IP)*7:0;
    m.WHIP=m.IP?(m.H+m.BB)/m.IP:0;
    m.K7=m.IP?(m.SO/m.IP)*7:0;
    m.H7=m.IP?(m.H/m.IP)*7:0;
    m.BB7=m.IP?(m.BB/m.IP)*7:0;
    m.KBB=m.BB?m.SO/m.BB:(m.SO>0?99:0);
    m.WL=m.W+'-'+m.L;
    return m;
  });
}

// Combined GP: union of hitting and pitching game keys per player
function buildCareerGP(){
  var gp={};
  hitData.forEach(function(r){
    if(num(r['PA'])===0)return;
    var p=r['Player'];if(!p)return;
    if(!gp[p])gp[p]={};
    gp[p][r['Season']+'_'+r['Game #']]=1;
  });
  pitData.forEach(function(r){
    var p=r['Player'];if(!p)return;
    if(!gp[p])gp[p]={};
    gp[p][r['Season']+'_'+r['Game #']]=1;
  });
  var out={};
  Object.keys(gp).forEach(function(p){out[p]=Object.keys(gp[p]).length;});
  return out;
}

function gameResult(ts,os){
  if(ts>os)return'W';if(ts<os)return'L';return'T';
}

function renderOverview(f){
  var sched=filt(schedData,f);
  if(!sched.length){document.getElementById('overviewContent').innerHTML=noData('&#x1F3DF;','No Data','');return;}
  var valid=sched.filter(function(r){return r['Team Score']!==''&&r['Opponent Score']!=='';});
  var wins=0,losses=0,ties=0,rf=0,ra=0;
  valid.forEach(function(r){
    var ts=num(r['Team Score']),os=num(r['Opponent Score']);
    var res=gameResult(ts,os);
    if(res==='W')wins++;else if(res==='L')losses++;else ties++;
    rf+=ts;ra+=os;
  });
  var total=wins+losses+ties;
  var wpct=total?(wins/total*100).toFixed(0)+'%':'---';
  var rpg=total?(rf/total).toFixed(1):'---';

  var html='<div class="ov-grid">';
  html+='<div class="chip wins"><div class="val">'+wins+'</div><div class="lbl">Wins</div></div>';
  html+='<div class="chip losses"><div class="val">'+losses+'</div><div class="lbl">Losses</div></div>';
  html+='<div class="chip pct"><div class="val">'+wpct+'</div><div class="lbl">Win %</div></div>';
  html+='<div class="chip"><div class="val">'+rf+'</div><div class="lbl">Runs For</div></div>';
  html+='<div class="chip"><div class="val">'+ra+'</div><div class="lbl">Runs Against</div></div>';
  html+='<div class="chip"><div class="val">'+rpg+'</div><div class="lbl">R / Game</div></div>';
  html+='</div>';
  html+='<div class="sec-title">Season Records</div>';

  if(recordCombined){
    var seMap={};
    sched.forEach(function(r){
      var s=r['Season'];
      if(!seMap[s])seMap[s]={season:s,W:0,L:0,T:0,RF:0,RA:0,rsW:0,rsL:0,rsT:0,poW:0,poL:0,poT:0};
      var m=seMap[s];
      if(r['Team Score']===''||r['Opponent Score']==='')return;
      var ts=num(r['Team Score']),os=num(r['Opponent Score']);
      var res=gameResult(ts,os);
      if(res==='W'){m.W++;if(r['Type']==='Playoffs')m.poW++;else m.rsW++;}
      else if(res==='L'){m.L++;if(r['Type']==='Playoffs')m.poL++;else m.rsL++;}
      else{m.T++;if(r['Type']==='Playoffs')m.poT++;else m.rsT++;}
      m.RF+=ts;m.RA+=os;
    });
    var rows=Object.values(seMap).sort(function(a,b){return parseInt(b.season)-parseInt(a.season);});
    html+='<div class="table-wrap"><table><thead><tr>';
    html+='<th style="text-align:left">Season</th><th>W</th><th>L</th><th>W%</th><th>RF</th><th>RA</th><th>+/-</th><th>Reg</th><th>Post</th>';
    html+='</tr></thead><tbody>';
    rows.forEach(function(r){
      var g=r.W+r.L+r.T,wp=g?(r.W/g*100).toFixed(0)+'%':'---',diff=r.RF-r.RA;
      var rsRec=r.rsW+'-'+r.rsL+(r.rsT?'-'+r.rsT:'');
      var poRec=(r.poW+r.poL+r.poT)>0?r.poW+'-'+r.poL+(r.poT?'-'+r.poT:''):'--';
      html+='<tr><td>'+r.season+'</td><td class="hi">'+r.W+'</td><td class="lo">'+r.L+'</td><td>'+wp+'</td>';
      html+='<td>'+r.RF+'</td><td>'+r.RA+'</td>';
      html+='<td class="'+(diff>=0?'hi':'lo')+'">'+(diff>=0?'+':'')+diff+'</td>';
      html+='<td>'+rsRec+'</td><td>'+poRec+'</td></tr>';
    });
    html+='</tbody></table></div>';
  } else {
    var stMap={};
    sched.forEach(function(r){
      var key=r['Season']+'||'+r['Type'];
      if(!stMap[key])stMap[key]={season:r['Season'],type:r['Type'],W:0,L:0,T:0,RF:0,RA:0};
      var m=stMap[key];
      if(r['Team Score']===''||r['Opponent Score']==='')return;
      var ts=num(r['Team Score']),os=num(r['Opponent Score']);
      var res=gameResult(ts,os);
      if(res==='W')m.W++;else if(res==='L')m.L++;else m.T++;
      m.RF+=ts;m.RA+=os;
    });
    var stRows=Object.values(stMap).sort(function(a,b){
      if(a.season!==b.season)return parseInt(b.season)-parseInt(a.season);
      return a.type==='Regular Season'?-1:1;
    });
    html+='<div class="table-wrap"><table><thead><tr>';
    html+='<th style="text-align:left">Season</th><th>Type</th><th>W</th><th>L</th><th>W%</th><th>RF</th><th>RA</th><th>+/-</th></tr></thead><tbody>';
    stRows.forEach(function(r){
      var g=r.W+r.L+r.T,wp=g?(r.W/g*100).toFixed(0)+'%':'---',diff=r.RF-r.RA;
      var pCls=r.type==='Playoffs'?'pill-po':'pill-rs',pLbl=r.type==='Playoffs'?'POST':'REG';

      html+='<td class="hi">'+r.W+'</td><td class="lo">'+r.L+'</td><td>'+wp+'</td>';
      html+='<td>'+r.RF+'</td><td>'+r.RA+'</td>';
      html+='<td class="'+(diff>=0?'hi':'lo')+'">'+(diff>=0?'+':'')+diff+'</td></tr>';
    });
    html+='</tbody></table></div>';
  }

  // Single-game team records
  var hitValid=hitData.filter(function(r){return num(r['PA'])>0;});
  var gameHitsMap={};
  hitValid.forEach(function(r){var k=r['Season']+'_'+r['Game #'];gameHitsMap[k]=(gameHitsMap[k]||0)+num(r['H']);});

  var schedFilt=filt(schedData,f);
  var gameKeys=[];
  var gInfo={};
  schedFilt.forEach(function(r){
    if(r['Team Score']===''||r['Opponent Score']==='')return;
    var k=r['Season']+'_'+r['Game #'];
    gameKeys.push(k);
    var ts=num(r['Team Score']),os=num(r['Opponent Score']);
    var res=gameResult(ts,os);
    var wlStr=res+(res==='T'?' (Tie)':' '+ts+'-'+os);
    gInfo[k]={season:r['Season'],opp:r['Opponent'],date:r['Date'],ts:ts,os:os,res:res,wlStr:wlStr};
  });

  function topGameRows(keys,valFn,cls,topN){
    return keys.slice().sort(function(a,b){return valFn(b)-valFn(a);}).slice(0,topN||5);
  }

  function recCard(title,keys,valFn,valLabel){
    var top=topGameRows(keys,valFn,null,5);
    var t='<div style="margin-bottom:14px">';
    t+='<div style="font-family:Bebas Neue,cursive;font-size:13px;letter-spacing:1px;color:var(--blue-mid);padding:6px 0 4px;border-bottom:1px solid var(--border);margin-bottom:6px">'+title+'</div>';
    t+='<div class="table-wrap"><table><thead><tr>';
    t+='<th style="text-align:left">Season</th><th style="text-align:left">Opponent</th><th style="text-align:left">Date</th>';
    t+='<th>Result</th><th>'+valLabel+'</th></tr></thead><tbody>';
    top.forEach(function(k){
      var g=gInfo[k];if(!g)return;
      var wlCls=g.res==='W'?'hi':g.res==='L'?'lo':'';
      var wlDisp=g.res==='T'?'<span class="pill pill-tie">TIE</span> '+g.ts+'-'+g.os:(g.res==='W'?'<span class="hi">W</span>':'<span class="lo">L</span>')+' '+g.ts+'-'+g.os;
      var val=valFn(k);
      t+='<tr><td>'+g.season+'</td><td>'+g.opp+'</td><td>'+g.date+'</td>';
      t+='<td>'+wlDisp+'</td><td><span class="hi">'+val+'</span></td></tr>';
    });
    t+='</tbody></table></div></div>';
    return t;
  }

  html+='<div class="sec-title">Team Single-Game Records</div>';
  html+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">';
  html+=recCard('Most Runs Scored',gameKeys,function(k){return gInfo[k]?gInfo[k].ts:0;},'RS');
  html+=recCard('Most Team Hits',gameKeys,function(k){return gameHitsMap[k]||0;},'H');
  html+=recCard('Biggest Win Margin',gameKeys,function(k){return gInfo[k]?gInfo[k].ts-gInfo[k].os:-99;},'Margin');
  html+='</div>';

  // Opponent records
  var oppMap={};
  schedFilt.forEach(function(r){
    if(!r['Opponent']||r['Team Score']===''||r['Opponent Score']==='')return;
    var o=r['Opponent'];
    if(!oppMap[o])oppMap[o]={opp:o,W:0,L:0,T:0,RF:0,RA:0};
    var ts=num(r['Team Score']),os=num(r['Opponent Score']);
    var res=gameResult(ts,os);
    if(res==='W')oppMap[o].W++;else if(res==='L')oppMap[o].L++;else oppMap[o].T++;
    oppMap[o].RF+=ts;oppMap[o].RA+=os;
  });
  var oppArr=Object.values(oppMap).sort(function(a,b){
    var ag=a.W+a.L+a.T,bg=b.W+b.L+b.T;
    return ag!==bg?bg-ag:b.W-a.W;
  });
  html+='<div class="sec-title">Record by Opponent</div>';
  html+='<div class="table-wrap"><table><thead><tr>';
  html+='<th style="text-align:left">Opponent</th><th>G</th><th>W</th><th>L</th><th>W%</th><th>RF</th><th>RA</th><th>+/-</th></tr></thead><tbody>';
  oppArr.forEach(function(o){
    var g=o.W+o.L+o.T,wp=g?(o.W/g*100).toFixed(0)+'%':'---',diff=o.RF-o.RA;
    html+='<tr><td>'+o.opp+'</td><td>'+g+'</td>';
    html+='<td class="'+(o.W>=o.L?'hi':'')+'">'+ o.W+'</td><td>'+o.L+'</td><td>'+wp+'</td>';
    html+='<td>'+o.RF+'</td><td>'+o.RA+'</td>';
    html+='<td class="'+(diff>=0?'hi':'lo')+'">'+(diff>=0?'+':'')+diff+'</td></tr>';
  });
  html+='</tbody></table></div>';
  document.getElementById('overviewContent').innerHTML=html;
}

      var v=c.fmt(p[c.key]),cls='';
      if(c.key==='ERA'&&p.ERA<3.00)cls='hi';
      else if(c.key==='WHIP'&&p.WHIP<1.20)cls='hi';
      else if(c.key==='K7'&&p.K7>8.0)cls='hi';
      html+='<td class="'+cls+'">'+v+'</td>';
    });
    html+='</tr>';
  });
  html+='</tbody></table></div>';
  document.getElementById('pitFullContent').innerHTML=html;
}

// ── PLAYER PROFILE ────────────────────────────────────────────────────
function renderProfile(){
  var sel=document.getElementById('profilePlayerSel');
  var player=sel?sel.value:'';
  var seasonSel=document.getElementById('profileSeasonSel');
  var profileSeason=seasonSel?seasonSel.value:'all';

  var players={};
  hitData.forEach(function(r){if(r['Player'])players[r['Player']]=true;});
  pitData.forEach(function(r){if(r['Player'])players[r['Player']]=true;});
  var list=Object.keys(players).sort(playerSort);

  // Build available seasons for this player
  var playerSeasons=new Set();
  if(player){
    hitData.filter(function(r){return r['Player']===player;}).forEach(function(r){if(r['Season'])playerSeasons.add(r['Season']);});
    pitData.filter(function(r){return r['Player']===player;}).forEach(function(r){if(r['Season'])playerSeasons.add(r['Season']);});
  }
  var seasonList=Array.from(playerSeasons).sort();

  var parts=[];
  parts.push('<div style="display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap">');
  parts.push('<label style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted)">Player</label>');
  parts.push('<select style="background:#fff;border:2px solid var(--blue);border-radius:6px;padding:7px 12px;font-size:14px;font-weight:600;color:var(--blue);font-family:DM Sans,sans-serif;min-width:200px" id="profilePlayerSel" onchange="renderProfile()">');
  [{label:'Active',status:'Active'},{label:'Inactive',status:'Inactive'},{label:'Sub',status:'Sub'}].forEach(function(g){
    var gP=list.filter(function(p){return(rosterStatus[p]||'Inactive')===g.status;});
    if(!gP.length)return;
    parts.push('<optgroup label="── '+g.label+' ──">');
    gP.forEach(function(p){parts.push('<option value="'+p+'"'+(p===player?' selected':'')+'>'+p+'</option>');});
    parts.push('</optgroup>');
  });
  parts.push('</select>');

  if(player && seasonList.length > 1){
    parts.push('<label style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted)">Season</label>');
    parts.push('<select style="background:#fff;border:2px solid var(--blue);border-radius:6px;padding:7px 12px;font-size:14px;font-weight:600;color:var(--blue);font-family:DM Sans,sans-serif;" id="profileSeasonSel" onchange="renderProfile()">');
    parts.push('<option value="all"'+(profileSeason==='all'?' selected':'')+'>Career</option>');
    seasonList.forEach(function(s){parts.push('<option value="'+s+'"'+(s===profileSeason?' selected':'')+'>'+s+'</option>');});
    parts.push('</select>');
  }
  parts.push('</div>');

  if(!player){
    parts.push(noData('&#x1F465;','Select a Player','Choose a player above to view their full profile.'));
    document.getElementById('profileContent').innerHTML=parts.join('');return;
  }

  // Filter by season if selected
  var hRows=hitData.filter(function(r){return r['Player']===player&&num(r['PA'])>0&&(profileSeason==='all'||r['Season']===profileSeason);});
  var pRows=pitData.filter(function(r){return r['Player']===player&&(profileSeason==='all'||r['Season']===profileSeason);});

  var hAgg=aggHit(hRows);var hTot=hAgg.length?hAgg[0]:{AB:0,H:0,GP:0,PA:0,OBP:0,SLG:0,AVG:0,OPS:0,HR:0,RBI:0,R:0,BB:0,SB:0,SO:0,B2:0,B3:0};
  var pAgg=aggPit(pRows);var pTot=pAgg.length?pAgg[0]:{IP:0,SO:0,W:0,L:0,ERA:0,WL:'0-0',WHIP:0,K7:0,CG:0,SV:0};

  // Two-way check using ALL career data (not filtered)
  var hRowsAll=hitData.filter(function(r){return r['Player']===player&&num(r['PA'])>0;});
  var pRowsAll=pitData.filter(function(r){return r['Player']===player;});
  var hAggAll=aggHit(hRowsAll);var hTotAll=hAggAll.length?hAggAll[0]:{AB:0};
  var pAggAll=aggPit(pRowsAll);var pTotAll=pAggAll.length?pAggAll[0]:{IP:0};
  var pitQual=false,hitQual=false;
  pRowsAll.forEach(function(r){if(num(r['IP'])>=10)pitQual=true;});
  if(pTotAll.IP>=15)pitQual=true;
  hRowsAll.forEach(function(r){if(num(r['AB'])>=20)hitQual=true;});
  if(hTotAll.AB>=50)hitQual=true;
  var role=(pitQual&&hitQual)?'both':(!hitQual&&pitQual)?'pitcher':'hitter';
  // Badge uses threshold, but display uses actual data presence
  var isHitter=hRows.length>0;
  var isPitcher=pRows.length>0;

  var roleBadge=role==='hitter'?'&#x26BE; Hitter':role==='pitcher'?'&#x1F94E; Pitcher':'&#x1F3C6; Two-Way';
  var roleCls='role-'+role;
  var status=rosterStatus[player]||'';

  var allSeasons=new Set();
  hRowsAll.forEach(function(r){if(r['Season'])allSeasons.add(r['Season']);});
  pRowsAll.forEach(function(r){if(r['Season'])allSeasons.add(r['Season']);});
  var numSeasons=allSeasons.size;

  var gpMap={};
  hRows.forEach(function(r){gpMap[r['Season']+'_'+r['Game #']]=1;});
  pRows.forEach(function(r){gpMap[r['Season']+'_'+r['Game #']]=1;});
  var dispGP=Object.keys(gpMap).length;

  var gpMapAll={};
  hRowsAll.forEach(function(r){gpMapAll[r['Season']+'_'+r['Game #']]=1;});
  pRowsAll.forEach(function(r){gpMapAll[r['Season']+'_'+r['Game #']]=1;});
  var careerGP=Object.keys(gpMapAll).length;

  parts.push('<div class="profile-card"><div class="profile-header">');
  parts.push('<div class="profile-name">'+player+'<span class="profile-role-badge '+roleCls+'">'+roleBadge+'</span>');
  if(status)parts.push('<span class="profile-role-badge" style="background:rgba(183,152,94,.25);color:var(--tan-light);border:1px solid rgba(183,152,94,.4);margin-left:4px">'+status+'</span>');
  if(numSeasons>=3){
    if(status==='Inactive'){
      parts.push('<span class="profile-role-badge" style="background:rgba(100,100,120,.25);color:#b0b8cc;border:1px solid rgba(150,150,180,.4);margin-left:4px">&#x23F1; '+numSeasons+'-Season Vet</span>');
    } else {
      parts.push('<span class="profile-role-badge" style="background:rgba(183,152,94,.35);color:var(--tan-light);border:1px solid rgba(183,152,94,.6);margin-left:4px">&#x2B50; '+numSeasons+'-Season Vet</span>');
    }
  }
  parts.push('</div>');
  var metaLabel=profileSeason==='all'?'Career ('+Array.from(allSeasons).sort()[0]+' to '+Array.from(allSeasons).sort().slice(-1)[0]+')':profileSeason+' Season';
  parts.push('<div class="profile-meta"><span>'+metaLabel+'</span><span>'+dispGP+' game'+(dispGP!==1?'s':'')+'</span>'+(profileSeason==='all'?'<span>'+careerGP+' career games</span>':'')+'</div>');
  parts.push('</div>');

  // ── HITTING SECTION ──
  if(isHitter&&hRows.length){
    parts.push('<div style="padding:10px 16px 4px;font-family:Bebas Neue,cursive;font-size:15px;letter-spacing:2px;color:#fff;background:var(--green-dark);margin-bottom:0">&#x26BE; Batting</div>');
    parts.push('<div class="profile-stats-grid">');
    parts.push(pstat(fmtAvg(hTot.AVG),'AVG','green'));
    parts.push(pstat(fmtAvg(hTot.OBP),'OBP',''));
    parts.push(pstat(fmtAvg(hTot.SLG),'SLG',''));
    parts.push(pstat(fmtAvg(hTot.OPS),'OPS','green'));
    parts.push(pstat(fmtI(hTot.H),'Hits',''));
    parts.push(pstat(fmtI(hTot.HR),'HR','gold'));
    parts.push(pstat(fmtI(hTot.RBI),'RBI',''));
    parts.push(pstat(fmtI(hTot.R),'Runs',''));
    parts.push(pstat(fmtI(hTot.BB),'BB',''));
    parts.push(pstat(fmtI(hTot.SB),'SB',''));
    parts.push('</div>');
  }

  // ── PITCHING SECTION ──
  if(isPitcher&&pRows.length){
    parts.push('<div style="padding:10px 16px 4px;font-family:Bebas Neue,cursive;font-size:15px;letter-spacing:2px;color:#fff;background:var(--blue);margin-bottom:0">&#x1F94E; Pitching</div>');
    parts.push('<div class="profile-stats-grid">');
    parts.push(pstat(fmtIP(pTot.IP),'IP','green'));
    parts.push(pstat(pTot.WL||'0-0','W-L',''));
    parts.push(pstat(fmt2(pTot.ERA),'ERA',pTot.ERA<3.5?'green':''));
    parts.push(pstat(fmtAvg(pTot.WHIP),'WHIP',pTot.WHIP<1.3?'green':''));
    parts.push(pstat(fmtI(pTot.SO),'K','gold'));
    parts.push(pstat(fmt2(pTot.K7),'K/7',''));
    parts.push(pstat(fmtI(pTot.CG),'CG',''));
    parts.push(pstat(fmtI(pTot.SV),'SV',''));
    parts.push('</div>');
  }

  // ── BEST SEASONS (only in career view) ──
  if(profileSeason==='all'){
    parts.push('<div style="padding:10px 16px 4px;font-family:Bebas Neue,cursive;font-size:14px;letter-spacing:1.5px;color:var(--blue);border-bottom:1px solid var(--border)">Best Seasons</div>');
    parts.push('<div class="best-season-grid">');
    if(isHitter){
      var seH={};
      hRowsAll.forEach(function(r){
        var s=r['Season'];
        if(!seH[s])seH[s]={season:s,PA:0,AB:0,H:0,B1:0,B2:0,B3:0,HR:0,RBI:0,R:0,HBP:0,BB:0,SO:0,SB:0,GP:{}};
        var m=seH[s];m.GP[r['Game #']]=1;
        m.PA+=num(r['PA']);m.AB+=num(r['AB']);m.H+=num(r['H']);
        m.B1+=num(r['1B']);m.B2+=num(r['2B']);m.B3+=num(r['3B']);m.HR+=num(r['HR']);
        m.RBI+=num(r['RBI']);m.R+=num(r['R']);m.HBP+=num(r['HBP']);m.BB+=num(r['BB']);m.SO+=num(r['SO']);m.SB+=num(r['SB']);
      });
      var seHA=Object.values(seH).filter(function(s){return s.AB>=20;}).map(function(m){
        m.GP=Object.keys(m.GP).length;m.AVG=m.AB?m.H/m.AB:0;
        m.OBP=m.PA?(m.H+m.BB+m.HBP)/m.PA:0;m.SLG=m.AB?(m.B1+2*m.B2+3*m.B3+4*m.HR)/m.AB:0;m.OPS=m.OBP+m.SLG;
        // Fantasy points for best season
        m.FP=m.B1*1+m.B2*2+m.B3*3+m.HR*4+m.R*1+m.RBI*1+m.BB*1+m.SB*2+m.HBP*1+m.SO*-1;
        m.FPG=m.GP?m.FP/m.GP:0;
        return m;
      }).sort(function(a,b){return b.FPG-a.FPG;});
      if(seHA.length){var b=seHA[0];
        parts.push('<div class="best-season-card"><div class="bsc-header"><span>Best Batting</span><span class="bsc-year">'+b.season+'</span></div>');
        parts.push('<div class="bsc-stats">'+bscStat(fmtAvg(b.AVG),'AVG')+bscStat(fmtAvg(b.OBP),'OBP')+bscStat(fmtAvg(b.SLG),'SLG'));
        parts.push(bscStat(fmtI(b.HR),'HR')+bscStat(fmtI(b.RBI),'RBI')+bscStat(b.FPG.toFixed(1),'FP/G')+'</div></div>');
      }
    }
    if(isPitcher){
      var seP={};
      pRowsAll.forEach(function(r){
        var s=r['Season'];
        if(!seP[s])seP[s]={season:s,GP:0,GS:0,W:0,L:0,SV:0,IP:0,H:0,ER:0,BB:0,SO:0,CG:0,HBP:0};
        var m=seP[s];m.GP++;m.GS+=num(r['GS']);m.W+=num(r['W']);m.L+=num(r['L']);
        m.SV+=num(r['SV']);m.IP+=num(r['IP']);m.H+=num(r['H']);m.ER+=num(r['ER']);m.BB+=num(r['BB']);m.SO+=num(r['SO']);m.HBP+=num(r['HBP']);
        if(num(r['IP'])>=7)m.CG++;
      });
      var sePA=Object.values(seP).filter(function(s){return s.IP>=10;}).map(function(m){
        m.ERA=m.IP?(m.ER/m.IP)*7:99;m.WHIP=m.IP?(m.H+m.BB)/m.IP:99;m.K7=m.IP?(m.SO/m.IP)*7:0;m.WL=m.W+'-'+m.L;
        var outs=Math.round(m.IP*3);
        m.FP=outs*1+m.SO*2+m.W*3+m.SV*5+m.ER*-1+m.H*-1+m.BB*-1+m.HBP*-1;
        m.FPG=m.GP?m.FP/m.GP:0;
        return m;
      }).sort(function(a,b){return b.FPG-a.FPG;});
      if(sePA.length){var b=sePA[0];
        parts.push('<div class="best-season-card"><div class="bsc-header pit"><span>Best Pitching</span><span class="bsc-year">'+b.season+'</span></div>');
        parts.push('<div class="bsc-stats">'+bscStat(fmt2(b.ERA),'ERA')+bscStat(fmtAvg(b.WHIP),'WHIP')+bscStat(fmt2(b.K7),'K/7'));
        parts.push(bscStat(b.WL,'W-L')+bscStat(fmtI(b.SO),'K')+bscStat(b.FPG.toFixed(1),'FP/G')+'</div></div>');
      }
    }
    parts.push('</div>');
  }

  // ── YEAR BY YEAR BATTING ──
  if(isHitter){
    var seHAll={};
    hRowsAll.forEach(function(r){
      var s=r['Season'];
      if(!seHAll[s])seHAll[s]={season:s,PA:0,AB:0,H:0,B1:0,B2:0,B3:0,HR:0,RBI:0,R:0,HBP:0,BB:0,SO:0,SB:0,GP:{}};
      var m=seHAll[s];m.GP[r['Game #']]=1;
      m.PA+=num(r['PA']);m.AB+=num(r['AB']);m.H+=num(r['H']);
      m.B1+=num(r['1B']);m.B2+=num(r['2B']);m.B3+=num(r['3B']);m.HR+=num(r['HR']);
      m.RBI+=num(r['RBI']);m.R+=num(r['R']);m.HBP+=num(r['HBP']);m.BB+=num(r['BB']);m.SO+=num(r['SO']);m.SB+=num(r['SB']);
    });
    var seHAllArr=Object.values(seHAll).map(function(m){
      m.GP=Object.keys(m.GP).length;m.AVG=m.AB?m.H/m.AB:0;
      m.OBP=m.PA?(m.H+m.BB+m.HBP)/m.PA:0;m.SLG=m.AB?(m.B1+2*m.B2+3*m.B3+4*m.HR)/m.AB:0;m.OPS=m.OBP+m.SLG;return m;
    }).sort(function(a,b){return parseInt(a.season)-parseInt(b.season);});
    var bestOPS=0;seHAllArr.forEach(function(r){if(r.OPS>bestOPS&&r.AB>=20)bestOPS=r.OPS;});
    // Totals row
    var totH={season:'TOTAL',GP:0,AB:0,H:0,HR:0,RBI:0,R:0,BB:0,SO:0,SB:0,PA:0,HBP:0,B1:0,B2:0,B3:0};
    seHAllArr.forEach(function(r){totH.GP+=r.GP;totH.AB+=r.AB;totH.H+=r.H;totH.HR+=r.HR;totH.RBI+=r.RBI;totH.R+=r.R;totH.BB+=r.BB;totH.SO+=r.SO;totH.SB+=r.SB;totH.PA+=r.PA;totH.HBP+=r.HBP;totH.B1+=r.B1;totH.B2+=r.B2;totH.B3+=r.B3;});
    totH.AVG=totH.AB?totH.H/totH.AB:0;totH.OBP=totH.PA?(totH.H+totH.BB+totH.HBP)/totH.PA:0;
    totH.SLG=totH.AB?(totH.B1+2*totH.B2+3*totH.B3+4*totH.HR)/totH.AB:0;totH.OPS=totH.OBP+totH.SLG;

    parts.push('<div class="season-log" style="padding-top:0"><div style="padding:8px 0;font-family:Bebas Neue,cursive;font-size:14px;letter-spacing:1.5px;color:var(--blue);border-bottom:2px solid var(--green)">&#x26BE; Year-by-Year Batting</div>');
    parts.push('<div class="season-log-scroll"><table><thead><tr><th>Year</th><th>GP</th><th>AB</th><th>H</th><th>AVG</th><th>OBP</th><th>SLG</th><th>OPS</th><th>HR</th><th>RBI</th><th>R</th><th>BB</th><th>SO</th><th>SB</th></tr></thead><tbody>');
    seHAllArr.forEach(function(r){
      var isBest=r.OPS>=bestOPS&&r.AB>=20&&bestOPS>0;
      parts.push('<tr class="'+(isBest?'highlight-row':'')+'"><td>'+r.season+(isBest?' &#x2605;':'')+'</td>');
      parts.push('<td>'+fmtI(r.GP)+'</td><td>'+fmtI(r.AB)+'</td><td>'+fmtI(r.H)+'</td>');
      parts.push('<td>'+fmtAvg(r.AVG)+'</td><td>'+fmtAvg(r.OBP)+'</td><td>'+fmtAvg(r.SLG)+'</td><td>'+fmtAvg(r.OPS)+'</td>');
      parts.push('<td>'+fmtI(r.HR)+'</td><td>'+fmtI(r.RBI)+'</td><td>'+fmtI(r.R)+'</td><td>'+fmtI(r.BB)+'</td><td>'+fmtI(r.SO)+'</td><td>'+fmtI(r.SB)+'</td></tr>');
    });
    // Totals row
    parts.push('<tr style="background:var(--blue);color:#fff;font-weight:700"><td>TOTAL</td>');
    parts.push('<td>'+fmtI(totH.GP)+'</td><td>'+fmtI(totH.AB)+'</td><td>'+fmtI(totH.H)+'</td>');
    parts.push('<td>'+fmtAvg(totH.AVG)+'</td><td>'+fmtAvg(totH.OBP)+'</td><td>'+fmtAvg(totH.SLG)+'</td><td>'+fmtAvg(totH.OPS)+'</td>');
    parts.push('<td>'+fmtI(totH.HR)+'</td><td>'+fmtI(totH.RBI)+'</td><td>'+fmtI(totH.R)+'</td><td>'+fmtI(totH.BB)+'</td><td>'+fmtI(totH.SO)+'</td><td>'+fmtI(totH.SB)+'</td></tr>');
    parts.push('</tbody></table></div></div>');
  }

  // ── YEAR BY YEAR PITCHING ──
  if(isPitcher){
    var sePAll={};
    pRowsAll.forEach(function(r){
      var s=r['Season'];
      if(!sePAll[s])sePAll[s]={season:s,GP:0,GS:0,W:0,L:0,SV:0,IP:0,H:0,ER:0,BB:0,SO:0,CG:0};
      var m=sePAll[s];m.GP++;m.GS+=num(r['GS']);m.W+=num(r['W']);m.L+=num(r['L']);
      m.SV+=num(r['SV']);m.IP+=num(r['IP']);m.H+=num(r['H']);m.ER+=num(r['ER']);m.BB+=num(r['BB']);m.SO+=num(r['SO']);
      if(num(r['IP'])>=7)m.CG++;
    });
    var sePAllArr=Object.values(sePAll).map(function(m){
      m.ERA=m.IP?(m.ER/m.IP)*7:99;m.WHIP=m.IP?(m.H+m.BB)/m.IP:99;m.K7=m.IP?(m.SO/m.IP)*7:0;m.WL=m.W+'-'+m.L;return m;
    }).sort(function(a,b){return parseInt(a.season)-parseInt(b.season);});
    var bestERA=99;sePAllArr.forEach(function(r){if(r.IP>=10&&r.ERA<bestERA)bestERA=r.ERA;});
    // Totals
    var totP={season:'TOTAL',GP:0,GS:0,W:0,L:0,SV:0,IP:0,H:0,ER:0,BB:0,SO:0,CG:0};
    sePAllArr.forEach(function(r){totP.GP+=r.GP;totP.GS+=r.GS;totP.W+=r.W;totP.L+=r.L;totP.SV+=r.SV;totP.IP+=r.IP;totP.H+=r.H;totP.ER+=r.ER;totP.BB+=r.BB;totP.SO+=r.SO;totP.CG+=r.CG;});
    totP.ERA=totP.IP?(totP.ER/totP.IP)*7:0;totP.WHIP=totP.IP?(totP.H+totP.BB)/totP.IP:0;totP.K7=totP.IP?(totP.SO/totP.IP)*7:0;totP.WL=totP.W+'-'+totP.L;

    parts.push('<div class="season-log" style="padding-top:4px"><div style="padding:8px 0;font-family:Bebas Neue,cursive;font-size:14px;letter-spacing:1.5px;color:var(--blue);border-bottom:2px solid var(--tan)">&#x1F94E; Year-by-Year Pitching</div>');
    parts.push('<div class="season-log-scroll"><table><thead><tr><th>Year</th><th>GP</th><th>GS</th><th>W-L</th><th>IP</th><th>ERA</th><th>WHIP</th><th>K/7</th><th>K</th><th>BB</th><th>H</th><th>CG</th><th>SV</th></tr></thead><tbody>');
    sePAllArr.forEach(function(r){
      var isBest=r.IP>=10&&r.ERA<=bestERA&&bestERA<99;
      parts.push('<tr class="'+(isBest?'highlight-row':'')+'"><td>'+r.season+(isBest?' &#x2605;':'')+'</td>');
      parts.push('<td>'+fmtI(r.GP)+'</td><td>'+fmtI(r.GS)+'</td><td>'+r.WL+'</td>');
      parts.push('<td>'+fmtIP(r.IP)+'</td><td>'+fmt2(r.ERA)+'</td><td>'+fmtAvg(r.WHIP)+'</td><td>'+fmt2(r.K7)+'</td>');
      parts.push('<td>'+fmtI(r.SO)+'</td><td>'+fmtI(r.BB)+'</td><td>'+fmtI(r.H)+'</td><td>'+fmtI(r.CG)+'</td><td>'+fmtI(r.SV)+'</td></tr>');
    });
    parts.push('<tr style="background:var(--blue);color:#fff;font-weight:700"><td>TOTAL</td>');
    parts.push('<td>'+fmtI(totP.GP)+'</td><td>'+fmtI(totP.GS)+'</td><td>'+totP.WL+'</td>');
    parts.push('<td>'+fmtIP(totP.IP)+'</td><td>'+fmt2(totP.ERA)+'</td><td>'+fmtAvg(totP.WHIP)+'</td><td>'+fmt2(totP.K7)+'</td>');
    parts.push('<td>'+fmtI(totP.SO)+'</td><td>'+fmtI(totP.BB)+'</td><td>'+fmtI(totP.H)+'</td><td>'+fmtI(totP.CG)+'</td><td>'+fmtI(totP.SV)+'</td></tr>');
    parts.push('</tbody></table></div></div>');
  }

  parts.push('</div>');
  document.getElementById('profileContent').innerHTML=parts.join('');
}
function pstat(val,lbl,cc){return'<div class="pstat"><div class="pval '+(cc||'')+'">'+val+'</div><div class="plbl">'+lbl+'</div></div>';}

// ── HIT STREAKS ───────────────────────────────────────────────────────
function computeStreaks(games){
  var streaks=[],cur=0,curSeason=null;
  games.forEach(function(g){
    var ab=parseInt(g['AB']||0)||0; if(ab===0)return;
    var h=parseInt(g['H']||0)||0;
    if(h>0){cur++;if(cur===1)curSeason=g['Season'];}
    else{if(cur>0)streaks.push({len:cur,season:curSeason});cur=0;curSeason=null;}
  });
  if(cur>0)streaks.push({len:cur,season:curSeason,active:true});
  return streaks;
}

function renderStreaks(){
  var pgMap={};
  hitData.forEach(function(r){
    var p=r['Player'];if(!p)return;
    if(!pgMap[p])pgMap[p]=[];
    pgMap[p].push(r);
  });
  Object.keys(pgMap).forEach(function(p){
    pgMap[p].sort(function(a,b){
      if(a['Season']!==b['Season'])return parseInt(a['Season'])-parseInt(b['Season']);
      return parseInt(a['Game #'])-parseInt(b['Game #']);
    });
  });
  var allTime=[];
  Object.keys(pgMap).forEach(function(p){
    var streaks=computeStreaks(pgMap[p]);if(!streaks.length)return;
    var best=streaks.reduce(function(a,b){return a.len>=b.len?a:b;});
    allTime.push({player:p,len:best.len,season:best.season,active:!!best.active});
  });
  allTime.sort(function(a,b){return b.len-a.len;});

  // Active: players with last game on a hit AND played in 2024 or 2025
  var activeNow=[];
  Object.keys(pgMap).forEach(function(p){
    var games=pgMap[p];
    var lastSeason=games[games.length-1]['Season'];
    if(parseInt(lastSeason)<2025)return;
    var cur=0;
    for(var i=games.length-1;i>=0;i--){
      var ab=parseInt(games[i]['AB']||0)||0;if(ab===0)continue;
      var h=parseInt(games[i]['H']||0)||0;
      if(h>0)cur++;else break;
    }
    if(cur>=2)activeNow.push({player:p,len:cur,season:lastSeason});
  });
  activeNow.sort(function(a,b){return b.len-a.len;});

  var topAll=allTime[0]||{player:'--',len:0,season:'--'};
  var topActive=activeNow[0]||{player:'--',len:0,season:'--'};
  var maxLen=topAll.len||1;

  var html='<div class="streak-hero">';
  html+='<div class="streak-hero-card"><div class="shc-header"><div class="shc-label">All-Time Record</div><div class="shc-player">'+topAll.player+'</div></div>';
  html+='<div class="shc-num">'+topAll.len+'</div><div class="shc-sub">consecutive games &mdash; '+topAll.season+'</div></div>';
  html+='<div class="streak-hero-card"><div class="shc-header" style="border-bottom-color:var(--green)"><div class="shc-label" style="color:#7de8aa">&#x1F7E2; Active Leader</div><div class="shc-player">'+topActive.player+'</div></div>';
  html+='<div class="shc-num" style="color:var(--green-dark)">'+topActive.len+'</div><div class="shc-sub">active &mdash; through '+topActive.season+'</div></div>';
  html+='</div>';

  html+='<div class="sec-title">All-Time Hit Streaks</div><div class="chart-card">';
  allTime.slice(0,20).forEach(function(s,i){
    var pct=(s.len/maxLen*100).toFixed(1);
    html+='<div class="streak-bar-row">';
    html+='<span class="sb-rank'+(i===0?' gold':'')+'">'+( i+1)+'</span>';
    html+='<span class="sb-name" title="'+s.player+'">'+initials(s.player)+'</span>';
    html+='<div class="sb-bar-wrap"><div class="sb-bar" style="width:'+pct+'%"></div></div>';
    html+='<span class="sb-val">'+s.len+'</span><span class="sb-season">'+s.season+'</span>';
    if(s.active)html+='<div class="sb-active-dot" title="Active"></div>';
    html+='</div>';
  });
  html+='</div>';

  if(activeNow.length){
    var maxA=activeNow[0].len||1;
    html+='<div class="sec-title">Current Active Streaks</div><div class="chart-card">';
    activeNow.forEach(function(s,i){
      var pct=(s.len/maxA*100).toFixed(1);
      html+='<div class="streak-bar-row">';
      html+='<span class="sb-rank'+(i===0?' gold':'')+'">'+( i+1)+'</span>';
      html+='<span class="sb-name" title="'+s.player+'">'+initials(s.player)+'</span>';
      html+='<div class="sb-bar-wrap"><div class="sb-bar" style="width:'+pct+'%;background:linear-gradient(90deg,var(--green-dark),var(--green-light))"></div></div>';
      html+='<span class="sb-val" style="color:var(--green-dark)">'+s.len+'</span>';
      html+='<div class="sb-active-dot"></div></div>';
    });
    html+='</div>';
  }
  document.getElementById('streaksContent').innerHTML=html;
}

    .sort(function(a,b){if(a['Season']!==b['Season'])return parseInt(a['Season'])-parseInt(b['Season']);return parseInt(a['Game #'])-parseInt(b['Game #']);});

  var isCum=(trendStat==='HR'||trendStat==='RBI'||trendStat==='H');

    cumBB+=parseInt(g['BB']||0)||0;cumHBP+=parseInt(g['HBP']||0)||0;
    cumB1+=parseInt(g['1B']||0)||0;cumB2+=parseInt(g['2B']||0)||0;cumB3+=parseInt(g['3B']||0)||0;
    cumHR+=parseInt(g['HR']||0)||0;cumRBI+=parseInt(g['RBI']||0)||0;
    var val=0;

  var maxV=Math.max.apply(null,vals)+(isCum?Math.max.apply(null,vals)*0.1+1:0.03);
  if(maxV<=minV)maxV=minV+0.01;
  function sx(i){return PAD.left+(i/(points.length-1||1))*cW;}
  function sy(v){return PAD.top+cH-((v-minV)/(maxV-minV))*cH;}
  var pathD='';
  points.forEach(function(p,i){pathD+=(i===0?'M':'L')+sx(i).toFixed(1)+','+sy(p.val).toFixed(1);});

  for(var t=0;t<=5;t++){var tv=minV+(maxV-minV)*(t/5),ty=sy(tv);svg+='<line x1="'+PAD.left+'" y1="'+ty.toFixed(1)+'" x2="'+(PAD.left+cW)+'" y2="'+ty.toFixed(1)+'" stroke="#d1d9e6" stroke-width="1"/>';var tl=isCum?Math.round(tv).toString():tv.toFixed(3).replace('0.','.');svg+='<text x="'+(PAD.left-6)+'" y="'+(ty+4).toFixed(1)+'" text-anchor="end" font-size="9" fill="#4a5568" font-family="DM Mono,monospace">'+tl+'</text>';}
  seasonChanges.forEach(function(sc){var scx=sx(sc.i);svg+='<line x1="'+scx.toFixed(1)+'" y1="'+PAD.top+'" x2="'+scx.toFixed(1)+'" y2="'+(PAD.top+cH)+'" stroke="#b7985e" stroke-width="1" stroke-dasharray="3,3" opacity="0.7"/><text x="'+(scx+3).toFixed(1)+'" y="'+(PAD.top+10)+'" font-size="8" fill="#8a6e3a" font-family="DM Sans,sans-serif">'+sc.season+'</text>';});
  svg+='<path d="'+areaD+'" fill="url(#ag)"/><path d="'+pathD+'" fill="none" stroke="#009a49" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>';
  points.forEach(function(p,i){var px=sx(i),py=sy(p.val);svg+='<circle cx="'+px.toFixed(1)+'" cy="'+py.toFixed(1)+'" r="3" fill="#009a49" opacity="0.7"/>';if(i%labelEvery===0||i===points.length-1){var lbl=trendMode==='season'?'G'+p.game:p.season;svg+='<text x="'+px.toFixed(1)+'" y="'+(PAD.top+cH+14)+'" text-anchor="middle" font-size="8" fill="#4a5568" font-family="DM Sans,sans-serif">'+lbl+'</text>';}});
  svg+='<line x1="'+PAD.left+'" y1="'+PAD.top+'" x2="'+PAD.left+'" y2="'+(PAD.top+cH)+'" stroke="#002c76" stroke-width="1.5"/><line x1="'+PAD.left+'" y1="'+(PAD.top+cH)+'" x2="'+(PAD.left+cW)+'" y2="'+(PAD.top+cH)+'" stroke="#002c76" stroke-width="1.5"/>';
  svg+='</svg>';

  var statLbls={'AVG':'Batting Average','OBP':'On-Base %','SLG':'Slugging %','OPS':'OPS','HR':'Home Runs','RBI':'RBI','H':'Hits'};
  var finalVal=points[points.length-1].val;
  var finalFmt=isCum?fmtI(finalVal):fmtAvg(finalVal);
  var peakVal=Math.max.apply(null,vals);

  html+='<div class="chart-card"><div class="chart-title">'+trendPlayer+' &mdash; '+(trendMode==='career'?'Career':'Season')+' '+statLbls[trendStat]+' Progression</div>';
  html+='<div style="display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap">';
  html+=pstat(finalFmt,(trendMode==='career'?'Career':'Season')+' '+trendStat,'green');
  html+=pstat(String(points.length),'Games w/ AB','');
  if(!isCum)html+=pstat(fmtAvg(peakVal),'Peak '+trendStat,'gold');
  html+='</div><div class="chart-wrap">'+svg+'</div></div>';

  if(trendMode==='career'){
    var seMap2={};
    pgames.forEach(function(g){
      var s=g['Season'];if(!seMap2[s])seMap2[s]={H:0,AB:0,PA:0,BB:0,HBP:0,B1:0,B2:0,B3:0,HR:0,RBI:0};

      m.B1+=parseInt(g['1B']||0)||0;m.B2+=parseInt(g['2B']||0)||0;m.B3+=parseInt(g['3B']||0)||0;
      m.HR+=parseInt(g['HR']||0)||0;m.RBI+=parseInt(g['RBI']||0)||0;
    });
    var seArr2=Object.keys(seMap2).sort().map(function(s){
      var m=seMap2[s];var obp=m.PA?(m.H+m.BB+m.HBP)/m.PA:0,slg=m.AB?(m.B1+2*m.B2+3*m.B3+4*m.HR)/m.AB:0;
      var val=0;
      if(trendStat==='AVG')val=m.AB?m.H/m.AB:0;else if(trendStat==='OBP')val=obp;else if(trendStat==='SLG')val=slg;
      else if(trendStat==='OPS')val=obp+slg;else if(trendStat==='HR')val=m.HR;else if(trendStat==='RBI')val=m.RBI;else if(trendStat==='H')val=m.H;
      return{season:s,val:val,ab:m.AB};
    }).filter(function(x){return x.ab>0;});
    if(seArr2.length>1){
      var maxSV=Math.max.apply(null,seArr2.map(function(x){return x.val;}));
      var bestSe=seArr2.reduce(function(a,b){return a.val>b.val?a:b;});
      html+='<div class="chart-card"><div class="chart-title">Season-by-Season '+statLbls[trendStat]+'</div><div style="display:flex;flex-direction:column;gap:8px">';
      seArr2.forEach(function(se){
        var pct=maxSV?se.val/maxSV*100:0,isBest=se.season===bestSe.season;

      });
      html+='</div></div>';
    }

  document.getElementById('trendsContent').innerHTML=html;

// ── GAME RECORDS ──────────────────────────────────────────────────────
function renderGamelog(){
  var hitValid=hitData.filter(function(r){return num(r['PA'])>0;});
  var pitAll=pitData;

  function gameCtx(season,gameNum){
    var g=schedMap[season+'_'+gameNum];
    if(!g)return{opp:'?',date:'?',result:'?',ts:'?',os:'?'};
    var ts=num(g['Team Score']),os=num(g['Opponent Score']);
    var res=gameResult(ts,os);
    var resTxt=res==='T'?'TIE '+ts+'-'+os:(res==='W'?'W ':'L ')+ts+'-'+os;
    return{opp:g['Opponent'],date:g['Date'],result:resTxt,res:res};
  }

  function topRows(arr,sortFn,topN){return arr.slice().sort(sortFn).slice(0,topN||5);}

  function sgrCard(title,icon,rawRows,valKey,valFmt,detailFn){
    var soMap={'Active':0,'Inactive':1,'Sub':2};
    var sorted=rawRows.slice().sort(function(a,b){
      var vd=num(b[valKey])-num(a[valKey]);
      if(vd!==0)return vd;
      var sa=soMap[rosterStatus[a['Player']]]!==undefined?soMap[rosterStatus[a['Player']]]:1;
      var sb=soMap[rosterStatus[b['Player']]]!==undefined?soMap[rosterStatus[b['Player']]]:1;
      return sa-sb;
    });
    var entries=[];
    var displayRank=1;
    var idx=0;
    while(idx<sorted.length&&displayRank<=5){
      var curVal=num(sorted[idx][valKey]);
      var group=[];
      while(idx<sorted.length&&num(sorted[idx][valKey])===curVal){group.push(sorted[idx]);idx++;}
      if(displayRank<=4){
        for(var gi=0;gi<group.length;gi++){
          if(displayRank<=4){
            entries.push({r:group[gi],rank:displayRank});
            displayRank++;
          } else {
            var overflow=group.slice(gi);
            if(overflow.length>1) entries.push({r:null,rank:5,isTieGroup:true,tiedPlayers:overflow,val:curVal});
            else entries.push({r:overflow[0],rank:5});
            break;
          }
        }
      } else {
        if(group.length===1) entries.push({r:group[0],rank:5});
        else if(group.length>1) entries.push({r:null,rank:5,isTieGroup:true,tiedPlayers:group,val:curVal});
        break;
      }
    }
    var html='<div class="sgr-card"><div class="sgr-header"><span class="sgr-title">'+title+'</span><span class="sgr-icon">'+icon+'</span></div>';
    for(var ei=0;ei<entries.length;ei++){
      var entry=entries[ei];
      if(entry.isTieGroup){
        var names=entry.tiedPlayers.map(function(r){
          return rosterStatus[r['Player']]==='Active'?('<strong>'+initials(r['Player'])+'</strong>'):initials(r['Player']);
        }).join(', ');
        html+='<div class="sgr-row" style="padding:6px 14px">';
        html+='<span class="sgr-rank">'+entry.rank+'</span>';
        html+='<div class="sgr-info">';
        html+='<div style="font-size:11px;color:var(--text-muted);font-style:italic">'+entry.tiedPlayers.length+' players tied at '+valFmt(entry.val)+'</div>';
        html+='<div style="font-size:11px;color:var(--text-muted)">'+names+'</div>';
        html+='</div><div class="sgr-val" style="font-size:20px;color:var(--text-muted)">'+valFmt(entry.val)+'</div>';
        html+='</div>';
      } else {
        var r=entry.r;
        var ctx=gameCtx(r['Season'],r['Game #']);
        var resCls=ctx.res==='W'?'hi':ctx.res==='L'?'lo':'';
        var isActive=rosterStatus[r['Player']]==='Active';
        html+='<div class="sgr-row">';
        html+='<span class="sgr-rank'+(entry.rank===1?' gold':'')+'">'+entry.rank+'</span>';
        html+='<div class="sgr-info">';
        html+='<div class="sgr-player">'+(isActive?'<strong>'+r['Player']+'</strong>':r['Player'])+'</div>';
        html+='<div class="sgr-detail">'+r['Season']+' vs '+ctx.opp+' &bull; '+ctx.date+' &bull; <span class="'+resCls+'">'+ctx.result+'</span>'+(detailFn?(' &bull; '+detailFn(r)):'')+'</div>';
        html+='</div>';
        html+='<div class="sgr-val">'+valFmt(num(r[valKey]))+'</div>';
        html+='</div>';
      }
    }
    html+='</div>';
    return html;
  }

  // Most H in a game
  var topH=topRows(hitValid.filter(function(r){return num(r['H'])>0;}),function(a,b){return num(b['H'])-num(a['H']);});
  // Most RBI
  var topRBI=topRows(hitValid.filter(function(r){return num(r['RBI'])>0;}),function(a,b){return num(b['RBI'])-num(a['RBI']);});
  // Most HR
  var topHR=topRows(hitValid.filter(function(r){return num(r['HR'])>0;}),function(a,b){return num(b['HR'])-num(a['HR']);});
  // Most SB
  var topSB=topRows(hitValid.filter(function(r){return num(r['SB'])>0;}),function(a,b){return num(b['SB'])-num(a['SB']);});
  // Most K (pitching)
  var topK=topRows(pitAll,function(a,b){return num(b['SO'])-num(a['SO']);});
  // Most IP no ER (min 4 IP)
  var pitNoER=pitAll.filter(function(r){return num(r['ER'])===0&&num(r['IP'])>=4;});
  var topNoER=topRows(pitNoER,function(a,b){return num(b['IP'])-num(a['IP']);});
  // Most IP with 0 BB in a single outing
  var pitNoBB=pitAll.filter(function(r){return num(r['BB'])===0&&num(r['IP'])>0;});

  html+='</div>';
  html+='<div class="sec-title">Pitching &mdash; Single Game Records</div>';

function renderGamelog(){
  var hitValid=hitData.filter(function(r){return num(r['PA'])>0;});
  var pitAll=pitData;

  function gameCtx(season,gameNum){
    var g=schedMap[season+'_'+gameNum];
    if(!g)return{opp:'?',date:'?',result:'?',ts:'?',os:'?'};
    var ts=num(g['Team Score']),os=num(g['Opponent Score']);
    var res=gameResult(ts,os);
    var resTxt=res==='T'?'TIE '+ts+'-'+os:(res==='W'?'W ':'L ')+ts+'-'+os;
    return{opp:g['Opponent'],date:g['Date'],result:resTxt,res:res};
  }

  function topRows(arr,sortFn,topN){return arr.slice().sort(sortFn).slice(0,topN||5);}

  function sgrCard(title,icon,rawRows,valKey,valFmt,detailFn){
    var soMap={'Active':0,'Inactive':1,'Sub':2};
    var sorted=rawRows.slice().sort(function(a,b){
      var vd=num(b[valKey])-num(a[valKey]);
      if(vd!==0)return vd;
      var sa=soMap[rosterStatus[a['Player']]]!==undefined?soMap[rosterStatus[a['Player']]]:1;
      var sb=soMap[rosterStatus[b['Player']]]!==undefined?soMap[rosterStatus[b['Player']]]:1;
      return sa-sb;
    });
    var entries=[];
    var displayRank=1;
    var idx=0;
    while(idx<sorted.length&&displayRank<=5){
      var curVal=num(sorted[idx][valKey]);
      var group=[];
      while(idx<sorted.length&&num(sorted[idx][valKey])===curVal){group.push(sorted[idx]);idx++;}
      if(displayRank<=4){
        for(var gi=0;gi<group.length;gi++){
          if(displayRank<=4){
            entries.push({r:group[gi],rank:displayRank});
            displayRank++;
          } else {
            var overflow=group.slice(gi);
            if(overflow.length>1) entries.push({r:null,rank:5,isTieGroup:true,tiedPlayers:overflow,val:curVal});
            else entries.push({r:overflow[0],rank:5});
            break;
          }
        }
      } else {
        if(group.length===1) entries.push({r:group[0],rank:5});
        else if(group.length>1) entries.push({r:null,rank:5,isTieGroup:true,tiedPlayers:group,val:curVal});
        break;
      }
    }
    var html='<div class="sgr-card"><div class="sgr-header"><span class="sgr-title">'+title+'</span><span class="sgr-icon">'+icon+'</span></div>';
    for(var ei=0;ei<entries.length;ei++){
      var entry=entries[ei];
      if(entry.isTieGroup){
        var names=entry.tiedPlayers.map(function(r){
          return rosterStatus[r['Player']]==='Active'?('<strong>'+initials(r['Player'])+'</strong>'):initials(r['Player']);
        }).join(', ');
        html+='<div class="sgr-row" style="padding:6px 14px">';
        html+='<span class="sgr-rank">'+entry.rank+'</span>';
        html+='<div class="sgr-info">';
        html+='<div style="font-size:11px;color:var(--text-muted);font-style:italic">'+entry.tiedPlayers.length+' players tied at '+valFmt(entry.val)+'</div>';
        html+='<div style="font-size:11px;color:var(--text-muted)">'+names+'</div>';
        html+='</div><div class="sgr-val" style="font-size:20px;color:var(--text-muted)">'+valFmt(entry.val)+'</div>';
        html+='</div>';
      } else {
        var r=entry.r;
        var ctx=gameCtx(r['Season'],r['Game #']);
        var resCls=ctx.res==='W'?'hi':ctx.res==='L'?'lo':'';
        var isActive=rosterStatus[r['Player']]==='Active';
        html+='<div class="sgr-row">';
        html+='<span class="sgr-rank'+(entry.rank===1?' gold':'')+'">'+entry.rank+'</span>';
        html+='<div class="sgr-info">';
        html+='<div class="sgr-player">'+(isActive?'<strong>'+r['Player']+'</strong>':r['Player'])+'</div>';
        html+='<div class="sgr-detail">'+r['Season']+' vs '+ctx.opp+' &bull; '+ctx.date+' &bull; <span class="'+resCls+'">'+ctx.result+'</span>'+(detailFn?(' &bull; '+detailFn(r)):'')+'</div>';
        html+='</div>';
        html+='<div class="sgr-val">'+valFmt(num(r[valKey]))+'</div>';
        html+='</div>';
      }
    }
    html+='</div>';
    return html;
  }

  // Most H in a game
  var topH=topRows(hitValid.filter(function(r){return num(r['H'])>0;}),function(a,b){return num(b['H'])-num(a['H']);});
  // Most RBI
  var topRBI=topRows(hitValid.filter(function(r){return num(r['RBI'])>0;}),function(a,b){return num(b['RBI'])-num(a['RBI']);});
  // Most HR
  var topHR=topRows(hitValid.filter(function(r){return num(r['HR'])>0;}),function(a,b){return num(b['HR'])-num(a['HR']);});
  // Most SB
  var topSB=topRows(hitValid.filter(function(r){return num(r['SB'])>0;}),function(a,b){return num(b['SB'])-num(a['SB']);});
  // Most K (pitching)
  var topK=topRows(pitAll,function(a,b){return num(b['SO'])-num(a['SO']);});
  // Most IP no ER (min 4 IP)
  var pitNoER=pitAll.filter(function(r){return num(r['ER'])===0&&num(r['IP'])>=4;});
  var topNoER=topRows(pitNoER,function(a,b){return num(b['IP'])-num(a['IP']);});
  // Most IP with 0 BB in a single outing
  var pitNoBB=pitAll.filter(function(r){return num(r['BB'])===0&&num(r['IP'])>0;});
  var topBB=topRows(pitNoBB,function(a,b){return num(b['IP'])-num(a['IP']);});

  var html='<div class="sec-title" style="margin-top:0">Batting &mdash; Single Game Records</div>';
  html+='<div class="sgr-grid">';
  html+=sgrCard('Most Hits','&#x26BE;',topH,'H',fmtI,function(r){return r['H']+'H / '+r['AB']+'AB';});
  html+=sgrCard('Most RBI','&#x1F4AA;',topRBI,'RBI',fmtI,function(r){return r['H']+'H, '+r['HR']+'HR';});
  html+=sgrCard('Most Home Runs','&#x1F680;',topHR,'HR',fmtI,function(r){return r['RBI']+' RBI';});
  html+=sgrCard('Most Stolen Bases','&#x26A1;',topSB,'SB',fmtI,null);
  html+='</div>';
  html+='<div class="sec-title">Pitching &mdash; Single Game Records</div>';
  html+='<div class="sgr-grid">';
  html+=sgrCard('Most Strikeouts','&#x1F525;',topK,'SO',fmtI,function(r){return fmtIP(num(r['IP']))+' IP, '+r['ER']+' ER';});
  html+=sgrCard('Most IP &mdash; No ER','&#x1F9CA;',topNoER,'IP',fmtIP,function(r){return r['SO']+' K, '+r['BB']+' BB';});
  html+=sgrCard('Most IP &mdash; No Walks','&#x1F3AF;',topBB,'IP',fmtIP,function(r){return r['SO']+' K, '+r['H']+' H, '+r['ER']+' ER';});
  html+='</div>';
  document.getElementById('gamelogContent').innerHTML=html;
}
