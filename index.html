function buildStatsContext(){
  // Aggregate all hitting
  var hitAgg = aggHit(hitData);
  var pitAgg = aggPit(pitData);

  // Season-by-season for each player (hitting)
  var playerSeasonHit = {};
  hitData.forEach(function(r){
    if(parseInt(r['PA']||0)===0)return;
    var key=r['Player']+'|'+r['Season'];
    if(!playerSeasonHit[key])playerSeasonHit[key]={player:r['Player'],season:r['Season'],PA:0,AB:0,H:0,B1:0,B2:0,B3:0,HR:0,RBI:0,R:0,HBP:0,BB:0,SO:0,SB:0};
    var m=playerSeasonHit[key];
    m.PA+=num(r['PA']);m.AB+=num(r['AB']);m.H+=num(r['H']);
    m.B1+=num(r['1B']);m.B2+=num(r['2B']);m.B3+=num(r['3B']);m.HR+=num(r['HR']);
    m.RBI+=num(r['RBI']);m.R+=num(r['R']);m.HBP+=num(r['HBP']);m.BB+=num(r['BB']);m.SO+=num(r['SO']);m.SB+=num(r['SB']);
  });
  Object.values(playerSeasonHit).forEach(function(m){
    m.AVG=m.AB?m.H/m.AB:0;m.OBP=m.PA?(m.H+m.BB+m.HBP)/m.PA:0;
    m.SLG=m.AB?(m.B1+2*m.B2+3*m.B3+4*m.HR)/m.AB:0;m.OPS=m.OBP+m.SLG;
  });

  var playerSeasonPit = {};
  pitData.forEach(function(r){
    var key=r['Player']+'|'+r['Season'];
    if(!playerSeasonPit[key])playerSeasonPit[key]={player:r['Player'],season:r['Season'],IP:0,W:0,L:0,SV:0,H:0,ER:0,BB:0,SO:0};
    var m=playerSeasonPit[key];
    m.IP+=num(r['IP']);m.W+=num(r['W']);m.L+=num(r['L']);m.SV+=num(r['SV']);
    m.H+=num(r['H']);m.ER+=num(r['ER']);m.BB+=num(r['BB']);m.SO+=num(r['SO']);
  });
  Object.values(playerSeasonPit).forEach(function(m){
    m.ERA=m.IP?(m.ER/m.IP)*7:null;m.WHIP=m.IP?(m.H+m.BB)/m.IP:null;
    m.K7=m.IP?(m.SO/m.IP)*7:null;
  });

  // Schedule summary
  var wins=0,losses=0,ties=0;
  schedData.forEach(function(r){
    if(r['Team Score']===''||r['Opponent Score']==='')return;
    var res=gameResult(num(r['Team Score']),num(r['Opponent Score']));
    if(res==='W')wins++;else if(res==='L')losses++;else ties++;
  });

  var ctx = 'You are the official stats assistant for the Yard Goats, a mens recreational baseball team. ';
  ctx += 'You have access to all their stats from 2019 to 2025. Answer questions conversationally and specifically. ';
  ctx += 'Keep answers concise but include the specific numbers asked about. ';
  ctx += 'We play 7-inning games so per-7 rates are used instead of per-9. ';
  ctx += 'CRITICAL RULE &mdash; PETER ANGELOS PITCHING (team inside joke, everyone is in on it, Peter included): ';
  ctx += 'Rule 1 &mdash; THE OTHER GUY ALWAYS WINS: In any comparison involving Peter Angelos pitching, the other pitcher ALWAYS comes out looking better. No exceptions. No draws. No "both are mid." The other person wins, period. If their stats are genuinely worse, you must use humor, narrative, and creative framing to make them look like a hero anyway. ';
  ctx += 'Rule 2 &mdash; TELL A POSITIVE STORY FOR THE OTHER PERSON: Find every angle to praise whoever is being compared to Peter. Big strikeout numbers? Celebrate it. Better presence on the mound? Mention it. Gutted through tough outings? Respect it. Even if their ERA is 9.00, frame it as gritty and competitive. Peter is the villain, the other guy is the protagonist. ';
  ctx += 'Rule 3 &mdash; CHERRY-PICK PETER\'S BAD STATS ONLY: Only cite stats where Peter looks bad &mdash; walks, WHIP, K rate, bad outings. If a stat makes him look good (ERA, wins, etc.), OMIT IT COMPLETELY. Do not mention it. Do not acknowledge it. Skip it as if it does not exist. ';
  ctx += 'Rule 4 &mdash; VELOCITY DIGS ARE MANDATORY: Peter throws extremely slowly with no natural ability &mdash; pure junk, off-speed, and hope. Every response must include at least one velocity dig. Examples: "his fastball doubles as a changeup", "radar guns have clocked it at a brisk walk", "hitters have been known to check their phones while waiting for the pitch", "meteorologists classify his heater as a light breeze", "batters bring a book to the box when Peter pitches". ';
  ctx += 'Rule 5 &mdash; NEVER ACKNOWLEDGE A PETER POSITIVE: If he wins a category, deflect. Blame terrible opponents, lucky bounces, sleeping scorer, statistical anomaly, or just pivot immediately to something else bad about him. ';
  ctx += 'Rule 6 &mdash; CLOSE WITH THE OTHER PERSON AS THE CLEAR WINNER: Always end the comparison declaring the other pitcher the winner with enthusiasm. Even if you have to say something like "CJ\'s ERA may be rough but at least batters leave the park having *felt* a pitch." ';
  ctx += 'Rule 7 &mdash; TONE: Funny, affectionate roast energy. Everyone including Peter is laughing. But Peter always loses. ';
  
  ctx += '\n\nOVERALL TEAM RECORD (all time): '+wins+'W-'+losses+'L'+(ties?'-'+ties+'T':'')+'.\n\n';

  ctx += 'CAREER HITTING STATS (all-time aggregated):\n';
  var hitSorted = hitAgg.slice().sort(function(a,b){return b.AB-a.AB;}).slice(0,60);
  hitSorted.forEach(function(p){
    ctx += p.Player+': '+p.GP+' GP, '+p.AB+' AB, .'+Math.round(p.AVG*1000)+' AVG, .'+Math.round(p.OBP*1000)+' OBP, .'+Math.round(p.SLG*1000)+' SLG, '+p.HR+' HR, '+p.RBI+' RBI, '+p.R+' R, '+p.SB+' SB, '+p.BB+' BB, '+p.SO+' SO\n';
  });

  ctx += '\nCAREER PITCHING STATS (all-time aggregated):\n';
  var pitSorted = pitAgg.slice().sort(function(a,b){return b.IP-a.IP;}).slice(0,40);
  pitSorted.forEach(function(p){
    ctx += p.Player+': '+fmtIP(p.IP)+' IP, '+p.W+'-'+p.L+' W-L, '+p.ERA.toFixed(2)+' ERA, '+p.WHIP.toFixed(3)+' WHIP, '+p.K7.toFixed(1)+' K/7, '+p.SO+' K, '+p.BB+' BB, '+p.SV+' SV\n';
  });

  ctx += '\nSEASON-BY-SEASON HITTING (key players):\n';
  var shValues = Object.values(playerSeasonHit).sort(function(a,b){return a.player.localeCompare(b.player)||a.season.localeCompare(b.season);});
  shValues.filter(function(m){return m.AB>=10;}).forEach(function(m){
    ctx += m.player+' '+m.season+': '+m.AB+' AB, .'+Math.round(m.AVG*1000)+' AVG, '+m.HR+' HR, '+m.RBI+' RBI, .'+Math.round(m.OPS*1000)+' OPS\n';
  });

  ctx += '\nSEASON-BY-SEASON PITCHING (key players):\n';
  var spValues = Object.values(playerSeasonPit).sort(function(a,b){return a.player.localeCompare(b.player)||a.season.localeCompare(b.season);});
  spValues.filter(function(m){return m.IP>=3;}).forEach(function(m){
    ctx += m.player+' '+m.season+': '+fmtIP(m.IP)+' IP, '+m.W+'-'+m.L+' W-L, '+(m.ERA!==null?m.ERA.toFixed(2):'-')+' ERA, '+m.SO+' K, '+m.BB+' BB\n';
  });

  ctx += '\nROSTER STATUS:\n';
  Object.keys(rosterStatus).forEach(function(p){ctx += p+': '+rosterStatus[p]+'\n';});

  return ctx;
}

async function askSend(){
  var input = document.getElementById('askInput');
  var q = (input.value||'').trim();
  if(!q || askLoading) return;

  askLoading = true;
  input.value = '';
  var sendBtn = document.getElementById('askSendBtn');
  sendBtn.disabled = true;
  sendBtn.textContent = 'Thinking...';

  // Add user message
  askMessages.push({role:'user', content:q});
  renderMessages();

  // Add loading bubble
  var loadingId = 'loading_'+Date.now();
  appendLoadingBubble(loadingId);

  try {
    var systemPrompt = buildStatsContext();

    var response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ASK_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 600,
        system: systemPrompt,
        messages: askMessages.slice(-6) // last 3 exchanges for context
      })
    });

    var data = await response.json();

    // Remove loading bubble
    var loadEl = document.getElementById(loadingId);
    if(loadEl) loadEl.parentElement.remove();

    if(data.content && data.content[0]){
      var answer = data.content[0].text;
      askMessages.push({role:'assistant', content:answer});
      renderMessages();
    } else if(data.error){
      var errType = data.error.type || '';
      var errMsg = data.error.message || 'Something went wrong.';
      var friendly = errType + ': ' + errMsg;
      if(errType === 'authentication_error'){
        friendly = 'API key rejected. The key may need to be refreshed.';
      } else if(errType === 'credit_balance_too_low'){
        friendly = 'Out of credits &mdash; check console.anthropic.com/billing.';
      } else if(errType === 'not_found_error'){
        friendly = 'Model not found: ' + errMsg;
      } else if(errType === 'overloaded_error'){
        friendly = 'Anthropic servers busy &mdash; try again in a moment.';
      }
      askMessages.push({role:'assistant', content:'Error: ' + friendly});
      renderMessages();
    } else {
      // Unexpected response shape - show raw for debugging
      askMessages.push({role:'assistant', content:'Unexpected response: ' + JSON.stringify(data).slice(0,200)});
      renderMessages();
    }
  } catch(err){
    var loadEl = document.getElementById(loadingId);
    if(loadEl) loadEl.parentElement.remove();
    askMessages.push({role:'assistant', content:'Connection error &mdash; check your internet and try again.'});
    renderMessages();
  }

  askLoading = false;
  var sb = document.getElementById('askSendBtn');
  if(sb){ sb.disabled = false; sb.innerHTML = 'Ask &#x1F410;'; }
  input.focus();
}

function appendLoadingBubble(id){
  var msgs = document.getElementById('askMessages');
  var row = document.createElement('div');
  row.className = 'ask-msg bot';
  row.innerHTML = '<div class="ask-avatar bot">&#x1F410;</div><div class="ask-bubble loading" id="'+id+'">thinking...</div>';
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function renderMessages(){
  var msgs = document.getElementById('askMessages');
  if(!msgs)return;
  msgs.innerHTML = '';
  askMessages.forEach(function(m){
    var row = document.createElement('div');
    row.className = 'ask-msg '+(m.role==='user'?'user':'bot');
    var avatar = m.role==='user'
      ? '<div class="ask-avatar user">YOU</div>'
      : '<div class="ask-avatar bot">&#x1F410;</div>';
    // Simple markdown: bold, line breaks
    var txt = m.content
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/[*][*](.*?)[*][*]/g,'<strong>$1</strong>')
      .replace(/\n/g,'<br>');
    var bubble = '<div class="ask-bubble">'+txt+'</div>';
    row.innerHTML = avatar + bubble;
    msgs.appendChild(row);
  });
  msgs.scrollTop = msgs.scrollHeight;
}


// ── FANTASY POINTS ────────────────────────────────────────────────────────
// ESPN Standard: 1B=1,2B=2,3B=3,HR=4,R=1,RBI=1,BB=1,SB=2,HBP=1,SO=-1
// Pitching: Out=1(3/IP),K=2,W=3,SV=5,ER=-1,H=-1,BB=-1,HBP=-1
var fpSeason='all';
var fpType='all';

function hitFP(r){
  // TB=1pt each (1B=1,2B=2,3B=3,HR=4), R=1, RBI=1, BB=1, SB=1, HBP=1, K=-1
  return num(r['1B'])*1+num(r['2B'])*2+num(r['3B'])*3+num(r['HR'])*4+
         num(r['R'])*1+num(r['RBI'])*1+num(r['BB'])*1+num(r['SB'])*1+
         num(r['HBP'])*1+num(r['SO'])*-1;
}
function hitFPBreakdown(r){
  var parts=[];
  if(num(r['1B'])>0)parts.push(r['1B']+'x1B (+'+num(r['1B'])+')');
  if(num(r['2B'])>0)parts.push(r['2B']+'x2B (+'+num(r['2B'])*2+')');
  if(num(r['3B'])>0)parts.push(r['3B']+'x3B (+'+num(r['3B'])*3+')');
  if(num(r['HR'])>0)parts.push(r['HR']+'HR (+'+num(r['HR'])*4+')');
  if(num(r['R'])>0)parts.push(r['R']+'R (+'+num(r['R'])+')');
  if(num(r['RBI'])>0)parts.push(r['RBI']+'RBI (+'+num(r['RBI'])+')');
  if(num(r['BB'])>0)parts.push(r['BB']+'BB (+'+num(r['BB'])+')');
  if(num(r['SB'])>0)parts.push(r['SB']+'SB (+'+num(r['SB'])+')');
  if(num(r['HBP'])>0)parts.push(r['HBP']+'HBP (+'+num(r['HBP'])+')');
  if(num(r['SO'])>0)parts.push(r['SO']+'K (-'+num(r['SO'])+')');
  return parts.join(', ');
}
function pitFP(r){
  // IP=3pts each, K=1, W=5, SV=5, L=-2, ER=-2, H=-1, BB=-1, HBP=-1
  var outs=Math.round(num(r['IP'])*3);
  return outs*1+num(r['SO'])*1+num(r['W'])*5+num(r['SV'])*5+num(r['L'])*-2+
         num(r['ER'])*-2+num(r['H'])*-1+num(r['BB'])*-1+num(r['HBP'])*-1;
}
function pitFPBreakdown(r){
  var outs=Math.round(num(r['IP'])*3);
  var parts=[];
  parts.push(fmtIP(num(r['IP']))+' IP (+'+outs+')');
  if(num(r['SO'])>0)parts.push(r['SO']+'K (+'+num(r['SO'])+')');
  if(num(r['W'])>0)parts.push('W (+5)');
  if(num(r['SV'])>0)parts.push('SV (+5)');
  if(num(r['L'])>0)parts.push('L (-2)');
  if(num(r['ER'])>0)parts.push(r['ER']+'ER (-'+num(r['ER'])*2+')');
  if(num(r['H'])>0)parts.push(r['H']+'H (-'+num(r['H'])+')');
  if(num(r['BB'])>0)parts.push(r['BB']+'BB (-'+num(r['BB'])+')');
  if(num(r['HBP'])>0)parts.push(r['HBP']+'HBP (-'+num(r['HBP'])+')');
  return parts.join(', ');
}

  parts.push('</div>');

  // ── SEASON TOTALS (min 8 games hitting, min 4 games pitching) ──
  var seHitMap={},sePitMap={};

  // ── SEASON AVERAGES (min 8 games hitting, min 4 games pitching) ──
  var seHitAvgArr=Object.values(seHitMap).filter(function(s){return s.gp>=8;}).map(function(s){s.fpg=s.fp/s.gp;return s;}).sort(function(a,b){return b.fpg-a.fpg;});

  parts.push(fpSeasonLB('Bottom 5 Hitting Avg FP/G',true,seHitAvgArr.slice(-5).reverse(),'avg','hit'));
  parts.push(fpSeasonLB('Top 5 Pitching Avg FP/G',false,sePitAvgArr.slice(0,5),'avg','pit'));
  parts.push(fpSeasonLB('Bottom 5 Pitching Avg FP/G',true,sePitAvgArr.slice(-5).reverse(),'avg','pit'));
  parts.push('</div>');

  // ── CAREER AVERAGES (min 15 games hitting / 40 PA, min 20 IP pitching) ──

    var p=r['Player'];
    if(!carHitMap[p])carHitMap[p]={player:p,fp:0,gp:0,ab:0,h:0,hr:0,rbi:0,r2:0,sb:0,bb:0,so:0,pa:0};
    var m=carHitMap[p];
    m.fp+=hitFP(r);m.gp++;m.pa+=num(r['PA']);m.ab+=num(r['AB']);m.h+=num(r['H']);
    m.hr+=num(r['HR']);m.rbi+=num(r['RBI']);m.r2+=num(r['R']);m.sb+=num(r['SB']);m.bb+=num(r['BB']);m.so+=num(r['SO']);
  });
  pitData.forEach(function(r){
    var p=r['Player'];
    if(!carPitMap[p])carPitMap[p]={player:p,fp:0,gp:0,ip:0,w:0,l:0,so:0,er:0,bb:0,h:0};
    var m=carPitMap[p];
    m.fp+=pitFP(r);m.gp++;m.ip+=num(r['IP']);m.w+=num(r['W']);m.l+=num(r['L']);
    m.so+=num(r['SO']);m.er+=num(r['ER']);m.bb+=num(r['BB']);m.h+=num(r['H']);
  });
  Object.values(carHitMap).forEach(function(m){m.avg=m.ab?m.h/m.ab:0;m.fpg=m.gp?m.fp/m.gp:0;});

  var carHitArr=Object.values(carHitMap).filter(function(s){return s.gp>=15||s.pa>=40;}).sort(function(a,b){return b.fpg-a.fpg;});

  parts.push('<div class="fp-tooltip" id="fpTooltip"></div>');

function buildFPChart(rows,games,type){
  var byGame={};
  rows.forEach(function(r){
    var g=parseInt(r['Game #']);
    if(!byGame[g])byGame[g]=[];
    var fp=type==='hit'?hitFP(r):pitFP(r);
    var tip=r['Player']+': '+fp.toFixed(0)+' FP | '+(type==='hit'?hitFPBreakdown(r):pitFPBreakdown(r));
    var gc=schedMap[fpSeason+'_'+g]||{};
    if(gc.Opponent)tip+=' | vs '+gc.Opponent;
    byGame[g].push({player:r['Player'],fp:fp,tip:tip});
  });

  if(!games.length)return '<div style="padding:20px;color:var(--text-muted);font-size:13px">No data for this season.</div>';

  var allFP=[];
  games.forEach(function(g){if(byGame[g])byGame[g].forEach(function(d){allFP.push(d.fp);});});
  var minFP=Math.min.apply(null,allFP.concat([-1]))-1;
  var maxFP=Math.max.apply(null,allFP.concat([1]))+1;

  var dotR=5,dotSpacing=12,padL=40,padR=16,padT=16,padB=28;
  // Width based on number of games
  var colW=Math.max(dotR*2+4,20);
  var W=Math.max(games.length*colW+padL+padR,300);
  var H=200;
  var rangeY=maxFP-minFP||1;

  function sx(gameIdx){return padL+gameIdx*colW+colW/2;}
  function sy(fp){return padT+(1-(fp-minFP)/rangeY)*(H-padT-padB);}

  var svg='<svg width="'+W+'" height="'+H+'" xmlns="http://www.w3.org/2000/svg" style="display:block">';

  // Grid lines
  var yticks=[];
  var step=Math.ceil((maxFP-minFP)/5);
  for(var v=Math.ceil(minFP);v<=maxFP;v+=step)yticks.push(v);
  yticks.forEach(function(v){
    var yp=sy(v);
    svg+='<line x1="'+padL+'" y1="'+yp.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+yp.toFixed(1)+'" stroke="'+(v===0?'#9ab':'#f0f4fa')+'" stroke-width="'+(v===0?1.5:1)+'"/>';
    svg+='<text x="'+(padL-4)+'" y="'+(yp+4).toFixed(1)+'" text-anchor="end" font-size="9" fill="#4a5568" font-family="DM Mono,monospace">'+Math.round(v)+'</text>';
  });

  // Dots - stacked vertically within each game column
  games.forEach(function(g,gi){
    if(!byGame[g])return;
    var xBase=sx(gi);
    var dots=byGame[g].slice().sort(function(a,b){return b.fp-a.fp;});
    // Stack from the fp position upward for multiples
    var grouped={};
    dots.forEach(function(d){
      var yKey=Math.round(d.fp*2)/2; // group by 0.5 increments
      if(!grouped[yKey])grouped[yKey]=[];
      grouped[yKey].push(d);
    });
    Object.keys(grouped).forEach(function(yk){
      var grp=grouped[yk];
      grp.forEach(function(d,idx){
        var yp=sy(d.fp)-(idx*dotSpacing);
        var isActive=rosterStatus[d.player]==='Active';
        var color=d.fp>0?(isActive?'#009a49':'#4aa87a'):(d.fp<0?(isActive?'#c0392b':'#e07070'):'#888');
        var safeTip=d.tip.replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        svg+='<circle cx="'+xBase.toFixed(1)+'" cy="'+yp.toFixed(1)+'" r="'+dotR+'" fill="'+color+'" opacity="0.85" style="cursor:pointer" onmouseenter="showFPTip(event,\''+safeTip+'\')" onmouseleave="hideFPTip()"/>';
      });
    });
    // X label
    svg+='<text x="'+xBase.toFixed(1)+'" y="'+(H-6)+'" text-anchor="middle" font-size="8" fill="#4a5568" font-family="DM Sans,sans-serif">G'+g+'</text>';
  });

  svg+='<line x1="'+padL+'" y1="'+padT+'" x2="'+padL+'" y2="'+(H-padB)+'" stroke="#002c76" stroke-width="1.5"/>';
  svg+='<line x1="'+padL+'" y1="'+(H-padB)+'" x2="'+(W-padR)+'" y2="'+(H-padB)+'" stroke="#002c76" stroke-width="1.5"/>';
  svg+='</svg>';

  return '<div class="fp-dot-wrap">'+svg+'</div>';
}

function buildSeasonSummary(hFilt,pFilt,season){
  var parts=[];
  parts.push('<div class="sec-title">'+season+' Season Summary</div>');
  parts.push('<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">');

  // Top 5 hitters this season by total FP
  var playerHitFP={};
  var playerHitStats={};
  hFilt.forEach(function(r){
    var p=r['Player'];
    if(!playerHitFP[p]){playerHitFP[p]=0;playerHitStats[p]={gp:0,h:0,hr:0,rbi:0,r2:0,sb:0,ab:0,bb:0};}
    playerHitFP[p]+=hitFP(r);
    var m=playerHitStats[p];
    m.gp++;m.h+=num(r['H']);m.hr+=num(r['HR']);m.rbi+=num(r['RBI']);
    m.r2+=num(r['R']);m.sb+=num(r['SB']);m.ab+=num(r['AB']);m.bb+=num(r['BB']);
  });
  var topHitters=Object.keys(playerHitFP).map(function(p){
    var s=playerHitStats[p];
    return{player:p,fp:playerHitFP[p],gp:s.gp,avg:s.ab?s.h/s.ab:0,h:s.h,hr:s.hr,rbi:s.rbi,r2:s.r2,sb:s.sb,bb:s.bb};
  }).sort(function(a,b){return b.fp-a.fp;}).slice(0,5);

  parts.push('<div class="fp-lb-card">');
  parts.push('<div class="fp-lb-header">Top 5 Hitters &mdash; '+season+'</div>');
  topHitters.forEach(function(item,i){
    var isActive=rosterStatus[item.player]==='Active';
    parts.push('<div class="fp-lb-row" style="flex-direction:column;align-items:flex-start;gap:2px">');
    parts.push('<div style="display:flex;align-items:center;gap:6px;width:100%">');
    parts.push('<span class="fp-lb-rank'+(i===0?' gold':'')+'">'+( i+1)+'</span>');
    parts.push('<div class="fp-lb-info"><div class="fp-lb-name">'+(isActive?'<strong>'+item.player+'</strong>':item.player)+'</div>');
    parts.push('<div class="fp-lb-detail">'+item.gp+' games</div></div>');
    parts.push('<div class="fp-lb-val pos" style="margin-left:auto">'+item.fp.toFixed(0)+' FP</div>');
    parts.push('</div>');
    parts.push('<div style="font-size:10px;color:var(--text-muted);padding-left:22px;padding-bottom:2px">');
    parts.push('.'+Math.round(item.avg*1000)+' AVG | '+Math.round(item.h)+'H '+Math.round(item.hr)+'HR '+Math.round(item.rbi)+'RBI '+Math.round(item.r2)+'R '+Math.round(item.sb)+'SB');
    parts.push('</div></div>');
  });
  parts.push('</div>');

  // Top 5 pitchers this season by total FP
  var playerPitFP={};
  var playerPitStats={};
  pFilt.forEach(function(r){
    var p=r['Player'];
    if(!playerPitFP[p]){playerPitFP[p]=0;playerPitStats[p]={gp:0,ip:0,w:0,l:0,so:0,er:0};}
    playerPitFP[p]+=pitFP(r);
    var m=playerPitStats[p];
    m.gp++;m.ip+=num(r['IP']);m.w+=num(r['W']);m.l+=num(r['L']);m.so+=num(r['SO']);m.er+=num(r['ER']);
  });
  var topPitchers=Object.keys(playerPitFP).map(function(p){
    var s=playerPitStats[p];
    var era=s.ip?(s.er/s.ip)*7:0;
    return{player:p,fp:playerPitFP[p],gp:s.gp,ip:s.ip,wl:s.w+'-'+s.l,so:s.so,era:era};
  }).sort(function(a,b){return b.fp-a.fp;}).slice(0,5);

  parts.push('<div class="fp-lb-card">');
  parts.push('<div class="fp-lb-header">Top 5 Pitchers &mdash; '+season+'</div>');
  topPitchers.forEach(function(item,i){
    var isActive=rosterStatus[item.player]==='Active';
    parts.push('<div class="fp-lb-row" style="flex-direction:column;align-items:flex-start;gap:2px">');
    parts.push('<div style="display:flex;align-items:center;gap:6px;width:100%">');
    parts.push('<span class="fp-lb-rank'+(i===0?' gold':'')+'">'+( i+1)+'</span>');
    parts.push('<div class="fp-lb-info"><div class="fp-lb-name">'+(isActive?'<strong>'+item.player+'</strong>':item.player)+'</div>');
    parts.push('<div class="fp-lb-detail">'+item.gp+' apps</div></div>');
    parts.push('<div class="fp-lb-val pos" style="margin-left:auto">'+item.fp.toFixed(0)+' FP</div>');
    parts.push('</div>');
    parts.push('<div style="font-size:10px;color:var(--text-muted);padding-left:22px;padding-bottom:2px">');
    parts.push(fmtIP(item.ip)+' IP | '+item.wl+' W-L | '+item.era.toFixed(2)+' ERA | '+Math.round(item.so)+'K');
    parts.push('</div></div>');
  });
  parts.push('</div>');
  parts.push('</div>'); // end grid

  // Top 5 hitting games this season
  var topHitGames=hFilt.map(function(r){return{r:r,fp:hitFP(r),breakdown:hitFPBreakdown(r)};}).sort(function(a,b){return b.fp-a.fp;}).slice(0,5);
  var topPitGames=pFilt.map(function(r){return{r:r,fp:pitFP(r),breakdown:pitFPBreakdown(r)};}).sort(function(a,b){return b.fp-a.fp;}).slice(0,5);

  parts.push('<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">');
  parts.push(fpGameLB('Top 5 Hitting Games &mdash; '+season,false,topHitGames,'hit'));
  parts.push(fpGameLB('Top 5 Pitching Games &mdash; '+season,false,topPitGames,'pit'));
  parts.push('</div>');

  return parts.join('');
}

function showFPTip(e,text){
  var tip=document.getElementById('fpTooltip');
  if(!tip)return;
  tip.innerHTML=text.replace(/\|/g,'<br>');
  tip.style.display='block';
  tip.style.left=(e.clientX+14)+'px';
  tip.style.top=(e.clientY-10)+'px';
}
function hideFPTip(){var tip=document.getElementById('fpTooltip');if(tip)tip.style.display='none';}

function fpGameLB(title,isBottom,items,type){
  var parts=['<div class="fp-lb-card">'];
  parts.push('<div class="fp-lb-header'+(isBottom?' bottom':'')+'">'+title+'</div>');
  items.forEach(function(item,i){
    var r=item.r;var fp=item.fp;
    var gc=schedMap[r['Season']+'_'+r['Game #']]||{};
    var meta=r['Season']+(gc.Opponent?' vs '+gc.Opponent:'');
    var statsLine=item.breakdown;
    var isActive=rosterStatus[r['Player']]==='Active';
    parts.push('<div class="fp-lb-row" style="flex-direction:column;align-items:flex-start;gap:2px">');
    parts.push('<div style="display:flex;align-items:center;gap:6px;width:100%">');
    parts.push('<span class="fp-lb-rank'+(i===0&&!isBottom?' gold':'')+'">'+( i+1)+'</span>');
    parts.push('<div class="fp-lb-info"><div class="fp-lb-name">'+(isActive?'<strong>'+r['Player']+'</strong>':r['Player'])+'</div>');
    parts.push('<div class="fp-lb-detail">'+meta+'</div></div>');
    parts.push('<div class="fp-lb-val '+(fp>=0?'pos':'neg')+'" style="margin-left:auto">'+fp.toFixed(0)+'</div>');
    parts.push('</div>');
    parts.push('<div style="font-size:10px;color:var(--text-muted);padding-left:22px;padding-bottom:2px">'+statsLine+'</div>');
    parts.push('</div>');
  });
  parts.push('</div>');
  return parts.join('');
}

function fpSeasonLB(title,isBottom,items,mode,type){
  var parts=['<div class="fp-lb-card">'];
  parts.push('<div class="fp-lb-header'+(isBottom?' bottom':'')+'">'+title+'</div>');
  items.forEach(function(item,i){
    var val=mode==='avg'?item.fpg:item.fp;
    var isActive=rosterStatus[item.player]==='Active';
    var statsLine='';
    if(type==='hit'){
      statsLine=item.gp+'G | .'+Math.round(item.avg*1000)+' AVG | '+Math.round(item.h)+'H '+Math.round(item.hr)+'HR '+Math.round(item.rbi)+'RBI '+Math.round(item.r2)+'R '+Math.round(item.sb)+'SB';
    } else {
      statsLine=item.gp+'G | '+fmtIP(item.ip)+' IP | '+item.wl+' W-L | '+item.era.toFixed(2)+' ERA | '+Math.round(item.so)+'K';
    }
    parts.push('<div class="fp-lb-row" style="flex-direction:column;align-items:flex-start;gap:2px">');
    parts.push('<div style="display:flex;align-items:center;gap:6px;width:100%">');
    parts.push('<span class="fp-lb-rank'+(i===0&&!isBottom?' gold':'')+'">'+( i+1)+'</span>');
    parts.push('<div class="fp-lb-info"><div class="fp-lb-name">'+(isActive?'<strong>'+item.player+'</strong>':item.player)+'</div>');
    parts.push('<div class="fp-lb-detail">'+item.season+'</div></div>');
    parts.push('<div class="fp-lb-val '+(val>=0?'pos':'neg')+'" style="margin-left:auto">'+val.toFixed(mode==='avg'?1:0)+'</div>');
    parts.push('</div>');
    parts.push('<div style="font-size:10px;color:var(--text-muted);padding-left:22px;padding-bottom:2px">'+statsLine+'</div>');
    parts.push('</div>');
  });
  parts.push('</div>');
  return parts.join('');
}

function fpCareerLB(title,isBottom,items,type){
  var parts=['<div class="fp-lb-card">'];
  parts.push('<div class="fp-lb-header'+(isBottom?' bottom':'')+'">'+title+'</div>');
  items.forEach(function(item,i){
    var isActive=rosterStatus[item.player]==='Active';
    var statsLine='';
    if(type==='hit'){
      statsLine=item.gp+'G | .'+Math.round(item.avg*1000)+' AVG | '+Math.round(item.h)+'H '+Math.round(item.hr)+'HR '+Math.round(item.rbi)+'RBI '+Math.round(item.r2)+'R '+Math.round(item.sb)+'SB';
    } else {
      var era=item.ip?(item.er/item.ip)*7:0;
      statsLine=item.gp+'G | '+fmtIP(item.ip)+' IP | '+item.wl+' W-L | '+era.toFixed(2)+' ERA | '+Math.round(item.so)+'K';
    }
    parts.push('<div class="fp-lb-row" style="flex-direction:column;align-items:flex-start;gap:2px">');
    parts.push('<div style="display:flex;align-items:center;gap:6px;width:100%">');
    parts.push('<span class="fp-lb-rank'+(i===0&&!isBottom?' gold':'')+'">'+( i+1)+'</span>');
    parts.push('<div class="fp-lb-info"><div class="fp-lb-name">'+(isActive?'<strong>'+item.player+'</strong>':item.player)+'</div>');
    parts.push('<div class="fp-lb-detail">'+item.gp+'G career</div></div>');
    parts.push('<div class="fp-lb-val '+(item.fpg>=0?'pos':'neg')+'" style="margin-left:auto">'+item.fpg.toFixed(1)+' FP/G</div>');
    parts.push('</div>');
    parts.push('<div style="font-size:10px;color:var(--text-muted);padding-left:22px;padding-bottom:2px">'+statsLine+'</div>');
    parts.push('</div>');
  });
  parts.push('</div>');
  return parts.join('');
}
